性", "独立与乘积期望"]}, {"id": "二元正态分布", "type": "c", "level": "advanced", "chapter": "l31", "en": "BivariateNormalDistribution", "def": "两个正态随机变量用相关系数 \\(\\rho\\) 绑在一起的联合分布:由两个独立标准正态的线性组合构造,5 个参数 \\(\\mu_X,\\mu_Y,\\sigma_X,\\sigma_Y,\\rho\\) 定死一切(等价地用 \\(\\sigma_{XY}=\\rho\\,\\sigma_X\\sigma_Y\\))。", "formula": "X=\\mu_X+aZ_1,\\qquad Y=\\mu_Y+bZ_1+cZ_2\\qquad\\big(Z_1,Z_2\\ \\text{独立}\\ n(0,1)\\big)", "rels": ["正态分布", "相关系数", "联合密度函数", "边缘正态与线性组合", "条件分布(二元正态)", "零相关即独立(正态特有)"]}, {"id": "二项分布", "type": "c", "level": "basic", "chapter": "l17", "en": "BinomialDistribution", "def": "\\(n\\) 次相互独立、成功概率恒为 \\(p\\) 的成/败试验中\"成功次数\"的分布,记 \\(\\text{Binomial}(n,p)\\),取值 \\(0,1,\\dots,n\\)。Exam P 最高频的离散分布。", "formula": "P[X=k]=\\binom{n}{k}p^{k}(1-p)^{\\,n-k},\\qquad k=0,1,\\dots,n", "rels": ["伯努利分布", "组合", "二项分布的期望与方差", "二项分布可加性", "超几何分布", "泊松逼近二项"]}, {"id": "二项分布可加性", "type": "c", "level": "advanced", "chapter": "l17", "en": "BinomialAdditivity", "def": "相互独立、同一成功概率 \\(p\\) 的二项随机变量之和仍是二项:\\(n\\) 参数相加、\\(p\\) 不动。\\(p\\) 不同则和不再是二项。", "formula": "X_i\\ \\text{独立},\\ X_i\\sim\\text{Binomial}(n_i,\\,p)\\ \\Longrightarrow\\ \\sum_{i=1}^{k}X_i\\ \\sim\\ \\text{Binomial}\\Big(\\sum_{i=1}^{k}n_i,\\ p\\Big)", "rels": ["二项分布", "随机变量独立性", "泊松可加性", "负二项分布可加性", "卷积公式"]}, {"id": "二项分布的期望与方差", "type": "c", "level": "basic", "chapter": "l17", "en": "BinomialMeanAndVariance", "def": "\\(\\text{Binomial}(n,p)\\) 的均值为 \\(np\\)、方差为 \\(np(1-p)\\)——把二项看成 \\(n\\) 个独立伯努利之和 \\(N=X_1+\\dots+X_n\\),期望与方差各自乘 \\(n\\) 直接得到。", "formula": "E[N]=np,\\qquad \\operatorname{Var}(N)=np(1-p)", "rels": ["二项分布", "伯努利分布", "期望的线性", "和的方差", "方差"]}, {"id": "互斥事件", "type": "c", "level": "basic", "chapter": "l01", "en": "MutuallyExclusiveEvents", "def": "两事件满足 $A\\cap B=\\varnothing$,即不可能同时发生(Venn 图上两圆不相交)。", "formula": "", "rels": ["概率公理", "容斥原理", "德摩根定律"]}, {"id": "众数", "type": "c", "level": "advanced", "chapter": "l10", "en": "Mode", "def": "让概率函数取最大值的取值——离散取 pmf 最高点,连续取密度最高峰,即\"最可能出现/最扎堆\"的值。可以不唯一(并列最高全是众数);样本众数 = 样本中出现最频繁的值。", "formula": "\\text{离散}:\\ \\operatorname{mode}=\\arg\\max_x p(x)\\qquad\\qquad \\text{连续}:\\ \\operatorname{mode}=\\arg\\max_x f(x)", "rels": ["概率密度函数", "概率函数", "多峰分布", "中位数", "泊松众数", "Beta分布"]}, {"id": "伯努利分布", "type": "c", "level": "basic", "chapter": "l17", "en": "BernoulliDistribution", "def": "单次成/败试验的分布:取 1(成功)概率 \\(p\\)、取 0(失败)概率 \\(1-p\\)。它是二项分布 \\(n=1\\) 的特例,也是二项的原子——\\(n\\) 个独立伯努利之和即二项。", "formula": "P[X=1]=p,\\quad P[X=0]=1-p;\\qquad E[X]=p,\\quad \\operatorname{Var}(X)=p(1-p)", "rels": ["二项分布", "二项分布的期望与方差", "几何分布", "概率函数"]}, {"id": "伽马分布", "type": "c", "level": "advanced", "chapter": "l20", "en": "GammaDistribution", "def": "\\(n\\) 个独立、同均值 \\(\\theta\\) 的指数随机变量之和 \\(Y=\\sum_{i=1}^n X_i\\) 服从参数 \\((n,\\theta)\\) 的伽马分布——\"接力等 \\(n\\) 次事件\"的总时间。\\(n=1\\) 时退化回指数分布。", "formula": "f_Y(x)=\\frac{x^{\\,n-1}e^{-x/\\theta}}{\\Gamma(n)\\,\\theta^{\\,n}},\\qquad E[Y]=n\\theta,\\quad \\operatorname{Var}(Y)=n\\theta^2", "rels": ["指数分布", "泊松过程", "期望的线性", "和的方差", "卷积公式"]}, {"id": "偏度", "type": "c", "level": "basic", "chapter": "l08", "en": "Skewness", "def": "三阶标准化中心矩 \\(\\gamma_1\\),度量分布不对称的方向与程度:正偏右尾长、负偏左尾长、对称为 0。同族的四阶版本是峰度(kurtosis),度量峰的尖钝;两者均无量纲。", "formula": "\\gamma_1=\\frac{E[(X-\\mu)^3]}{\\sigma^3}\\qquad\\qquad \\text{峰度}=\\frac{E[(X-\\mu)^4]}{\\sigma^4}", "rels": ["矩", "标准差", "期望", "中位数", "众数"]}, {"id": "先验后验概率", "type": "c", "level": "basic", "chapter": "l04", "en": "PriorAndPosteriorProbability", "def": "先验概率 \\(P[A_i]\\) 是观测到证据 B 之前对各原因的概率判断(题面给的初始/整体比例);后验概率 \\(P[A_i\\mid B]\\) 是观测到证据之后用贝叶斯定理更新出的概率。一先一后,本质是\"用证据更新信念\"。", "formula": "\\text{先验 } P[A_i]\\;\\xrightarrow{\\;\\text{观测到证据 } B\\;}\\;\\text{后验 } P[A_i\\mid B]", "rels": ["贝叶斯定理", "条件概率", "全概率公式"]}, {"id": "免赔额与正赔付条件", "type": "c", "level": "hard", "chapter": "l06", "en": "DeductibleAndPositivePayment", "def": "带免赔额 d 的保单:赔付 = 损失 − d(损失超过 d 才赔)。Exam P 高频形态是\"given that a payment is made\"——把\"有正赔付\"当条件事件,先把条件与目标都翻译回损失 X 的区间再上条件概率。", "formula": "\\Pr(X\\le c+d\\mid X>d)=\\frac{\\Pr(d<X\\le c+d)}{\\Pr(X>d)}", "rels": ["条件概率", "生存函数", "随机变量的条件分布", "条件密度与条件pmf", "混合型随机变量"]}, {"id": "全方差公式", "type": "c", "level": "hard", "chapter": "l16", "en": "LawOfTotalVariance", "def": "总方差 = 组内方差的平均 + 组间均值的方差(EVVE)。总波动来自两处:每组内部本身的散布(条件方差的期望),以及各组中心彼此的差异(条件期望的方差)——两项相加,缺一不可。", "formula": "\\operatorname{Var}(X)=\\underbrace{E\\big[\\operatorname{Var}(X\\mid Y)\\big]}_{\\text{组内方差的平均}}+\\underbrace{\\operatorname{Var}\\big(E[X\\mid Y]\\big)}_{\\text{组均值的方差}}", "rels": ["条件方差", "条件期望", "条件期望是随机变量", "全期望公式", "方差"]}, {"id": "全期望公式", "type": "c", "level": "advanced", "chapter": "l16", "en": "LawOfTotalExpectation", "def": "总期望等于条件期望的期望(塔式法则):先按 \\(Y\\) 分组算各组内的条件期望,再按各组出现的概率加权平均,结果恰好是总期望——\"平均的平均 = 总平均\"。当直接算 \\(E[X]\\) 难、\"给定 \\(Y\\) 后\"好算时的分而治之利器。", "formula": "E[g(X)]=E_Y\\!\\big[\\,E_X[g(X)\\mid Y]\\,\\big];\\qquad E[X]=E\\big[E[X\\mid Y]\\big]", "rels": ["条件期望", "条件期望是随机变量", "全概率公式", "全方差公式", "条件矩", "期望"]}, {"id": "全概率公式-连续", "type": "c", "level": "advanced", "chapter": "l29", "en": "LawOfTotalProbabilityContinuous", "def": "把\"给定各种 \\(y\\) 时的条件密度\"按 \\(Y\\) 的密度加权积分,还原出 \\(X\\) 的边缘密度——离散全概率的加权求和换成加权积分,镜像成立。", "formula": "f_X(x)=\\int_{-\\infty}^{\\infty} f_{X\\mid Y}(x\\mid y)\\,f_Y(y)\\,dy", "rels": ["全概率公式", "条件密度函数", "边缘密度-连续", "贝叶斯定理-连续", "全期望公式"]}, {"id": "全概率公式", "type": "c", "level": "advanced", "chapter": "l04", "en": "LawOfTotalProbability", "def": "把一个事件的总概率沿一组互斥且完备的\"原因\"拆开:在每种情形 \\(B_i\\) 下算 A 的条件概率,再按该情形出现的权重 \\(P[B_i]\\) 加权求和。本质是\"分组加权平均\"。", "formula": "P[A]=\\sum_{i=1}^{n}P[B_i]\\,P[A\\mid B_i]", "rels": ["条件概率", "乘法公式", "互斥事件", "贝叶斯定理", "全概率公式-连续", "全期望公式"]}, {"id": "几何分布", "type": "c", "level": "basic", "chapter": "l18", "en": "GeometricDistribution", "def": "负二项分布 \\(k=1\\) 的特例——每次成功概率 \\(p\\) 的独立试验中,第一次成功之前的失败次数 \\(N\\) 的分布。概率逐项按 \\((1-p)\\) 等比(几何)衰减,故得名。", "formula": "P[n]=p(1-p)^n,\\ \\ n=0,1,2,\\dots;\\qquad E[N]=\\frac{1-p}{p},\\quad \\operatorname{Var}(N)=\\frac{1-p}{p^2}", "rels": ["负二项分布", "几何分布无记忆性", "伯努利分布", "指数分布", "生存函数"]}, {"id": "几何分布无记忆性", "type": "c", "level": "advanced", "chapter": "l18", "en": "GeometricMemorylessness", "def": "已知前 \\(n\\) 次都未成功(\\(N\\ge n\\)),剩余等待 \\(N-n\\) 的分布与从头开始完全相同——几何分布在整数点上无记忆,过去的失败被\"忘光\"。", "formula": "N-n\\ \\big|\\ N\\ge n\\ \\sim\\ \\text{同均值的几何分布}\\quad\\Longrightarrow\\quad E[N-n\\mid N\\ge n]=E[N]", "rels": ["几何分布", "无记忆性", "条件期望", "条件概率", "指数分布"]}, {"id": "几何概率", "type": "c", "level": "advanced", "chapter": "l25", "en": "GeometricProbability", "def": "联合均匀分布下事件概率的几何算法:密度是常数,二重积分退化为面积之比。把事件画成区域、数面积,通常比积分快得多。", "formula": "P\\big[(X,Y)\\in A\\big]=\\iint_{A\\cap R}\\frac{1}{\\text{Area}(R)}\\,dx\\,dy=\\frac{\\text{Area}(A\\cap R)}{\\text{Area}(R)}", "rels": ["联合均匀分布", "区域概率与积分限", "等可能模型", "连续型条件概率"]}, {"id": "分布函数法", "type": "c", "level": "advanced", "chapter": "l34", "en": "DistributionFunctionTechnique", "def": "求 \\(Y=g(X)\\) 分布的通用方法:先写 \\(F_Y(y)=P[g(X)\\le y]\\),把关于 Y 的事件反解成关于 X 的事件、用已知的 \\(F_X\\) 表达,最后对 y 求导得密度。不靠记公式,单调、非单调都适用——最稳妥的起手式。", "formula": "F_Y(y)=\\Pr\\big(g(X)\\le y\\big)=\\begin{cases}F_X\\big(g^{-1}(y)\\big), & g\\ \\text{单调递增}\\\\[4pt]1-F_X\\big(g^{-1}(y)\\big), & g\\ \\text{单调递减(}X\\text{ 连续)}\\end{cases}", "rels": ["累积分布函数", "单调变换密度法", "非单调变换", "概率密度函数", "次序统计量", "最大值分布"]}, {"id": "区域概率与积分限", "type": "c", "level": "hard", "chapter": "l24", "en": "ProbabilityOverARegion", "def": "连续二维概率的计算主线:\\(P[(X,Y)\\in R]=\\iint_R f\\,dA\\)。难点不在积分本身,而在把区域 R(与支撑的交集)翻译成正确的内外层积分限——尤其三角形、斜边有界区域。", "formula": "P[(X,Y)\\in R]=\\iint_R f(x,y)\\,dA=\\int_{x_{\\min}}^{x_{\\max}}\\!\\!\\int_{y_{\\text{low}}(x)}^{y_{\\text{high}}(x)} f(x,y)\\,dy\\,dx", "rels": ["联合密度函数", "积分限与支撑", "几何概率", "联合累积分布函数", "连续型条件概率"]}, {"id": "协方差", "type": "c", "level": "basic", "chapter": "l13", "en": "Covariance", "def": "度量两个随机变量\"同涨同跌\"程度的量:两变量各自减去均值后,乘积的期望。正 = 同向变动,负 = 反向变动,0 = 无线性关联。它正是 \\(\\operatorname{Var}(X+Y)\\) 展开时多出的那个交叉项。", "formula": "\\operatorname{Cov}(X,Y)=E\\big[(X-\\mu_X)(Y-\\mu_Y)\\big]=E[XY]-E[X]\\,E[Y]", "rels": ["联合矩", "期望的线性", "和的方差", "协方差的性质", "相关系数", "独立与不相关"]}, {"id": "协方差的性质", "type": "c", "level": "basic", "chapter": "l13", "en": "CovarianceProperties", "def": "协方差作为双变量函数的代数规则:对称、在每个位置上线性(双线性)、加常数不变、自身协方差退化为方差。合起来一条顶四条:常数全丢,系数乘积外提。", "formula": "\\operatorname{Cov}(aX+b,\\,cY+d)=ac\\,\\operatorname{Cov}(X,Y)", "rels": ["协方差", "方差", "和的方差", "期望的线性"]}, {"id": "单调变换密度法", "type": "c", "level": "advanced", "chapter": "l34", "en": "ChangeOfVariableTechnique", "def": "g 单调时求 \\(Y=g(X)\\) 密度的一步公式:新密度 = 旧密度在对应点取值 × 反函数导数的绝对值(雅可比)。绝对值保证密度非负,递增递减共用同一条式子。", "formula": "f_Y(y)=f_X\\big(h(y)\\big)\\,\\big|h'(y)\\big|,\\qquad h(y)=g^{-1}(y)", "rels": ["分布函数法", "雅可比因子", "非单调变换", "积分限与支撑", "概率密度函数", "多变量变换的雅可比法"]}, {"id": "卷积公式", "type": "c", "level": "hard", "chapter": "l35", "en": "ConvolutionFormula", "def": "求和 \\(Z=X+Y\\) 密度的公式:固定 z,沿直线 \\(x+y=z\\) 把联合密度\"扫一遍\"积分。它是雅可比法取 \\(W=Y\\) 的特例(\\(|J|=1\\));X、Y 独立时联合密度拆成边缘乘积,得经典卷积 \\(f_X*f_Y\\)。", "formula": "f_Z(z)=\\int_{-\\infty}^{\\infty} f_{X,Y}(z-w,\\,w)\\,dw\\;\\xrightarrow{\\ X\\perp Y\\ }\\;f_Z(z)=\\int_{-\\infty}^{\\infty} f_X(z-w)\\,f_Y(w)\\,dw", "rels": ["多变量变换的雅可比法", "独立和的MGF", "独立和的母函数", "连续型独立性", "积分限与支撑", "联合密度函数"]}, {"id": "变异系数", "type": "c", "level": "basic", "chapter": "l08", "en": "CoefficientOfVariation", "def": "标准差除以均值的无量纲比值,度量\"相对波动\":单位被约掉,可横向比较不同尺度、不同量纲分布的离散程度。保险语境常用。", "formula": "\\mathrm{CV}=\\frac{\\sigma}{\\mu}", "rels": ["标准差", "期望", "方差", "偏度"]}, {"id": "和的方差", "type": "c", "level": "advanced", "chapter": "l28", "en": "VarianceOfSum", "def": "相关随机变量之和(或线性组合)的方差:除各自方差外,必须补上交叉的协方差项。协方差的头号用途。", "formula": "\\operatorname{Var}(X\\pm Y)=\\operatorname{Var}X+\\operatorname{Var}Y\\pm2\\operatorname{Cov}(X,Y)", "rels": ["方差", "协方差", "独立与不相关", "正态的线性组合"]}, {"id": "和的正态近似", "type": "c", "level": "advanced", "chapter": "l22", "en": "NormalApproximationOfSums", "def": "\\(n\\) 个 iid(\\(\\mu,\\sigma^2\\))随机变量之和 \\(S_n=\\sum X_i\\) 在 \\(n\\) 大时近似正态 \\(N(n\\mu,\\ n\\sigma^2)\\):期望方差都乘 \\(n\\)、标准差乘 \\(\\sqrt n\\)。保险\"总赔付超预算 / 基金够不够赔\"的母题工具。", "formula": "S_n=\\sum_{i=1}^{n}X_i\\ \\approx\\ N\\!\\big(n\\mu,\\ n\\sigma^2\\big),\\qquad Z=\\frac{S_n-n\\mu}{\\sqrt n\\,\\sigma}", "rels": ["中心极限定理", "样本均值分布", "连续性修正", "正态百分位数", "和的方差"]}, {"id": "四分位数", "type": "c", "level": "basic", "chapter": "l09", "en": "Quartile", "def": "25 分位数(第一四分位数 \\(Q_1\\))与 75 分位数(第三四分位数 \\(Q_3\\)):把分布按累积概率切成四等份的位置点,中位数即 \\(Q_2\\)。", "formula": "Q_1=\\pi_{0.25}\\qquad\\qquad Q_3=\\pi_{0.75}", "rels": ["百分位数", "中位数", "累积分布函数"]}, {"id": "均匀分布的分位数", "type": "c", "level": "advanced", "chapter": "l15", "en": "UniformDistributionPercentiles", "def": "\\(U(a,b)\\) 的 100\\(p\\) 百分位数是\"沿区间走 \\(p\\) 那么远\"的线性插值 \\((1-p)a+pb\\);且均匀分布限制到任何子区间后仍是均匀,中点/长度比工具照用——两者组合可秒解一大类免赔额题。", "formula": "\\pi_p=(1-p)\\,a+p\\,b", "rels": ["百分位数", "中位数", "连续均匀分布", "条件分布", "免赔额与正赔付条件"]}, {"id": "均匀分布的矩", "type": "c", "level": "basic", "chapter": "l15", "en": "UniformDistributionMoments", "def": "\\(U(a,b)\\) 的均值是区间中点、方差是长度平方除以 12;\\([0,\\theta]\\) 特例下各阶原点矩有闭式 \\(\\theta^n/(n+1)\\)。方差只跟区间长度有关,与位置无关。", "formula": "\\mathrm{E}[X]=\\frac{a+b}{2},\\qquad \\operatorname{Var}(X)=\\frac{(b-a)^2}{12}", "rels": ["连续均匀分布", "期望", "方差", "矩", "离散均匀分布"]}, {"id": "多变量变换的雅可比法", "type": "c", "level": "hard", "chapter": "l35", "en": "MultivariateChangeOfVariables", "def": "已知 \\((X,Y)\\) 的联合密度,求 \\(Z=g(X,Y)\\)(商/积/和等)的密度:补一个辅助变量 W 把\"二维→一维\"凑成一一对应的\"二维→二维\",解出逆变换、乘雅可比行列式的绝对值得 \\(f_{Z,W}\\),最后把 W 积掉。W 只是脚手架。", "formula": "f_{Z,W}(z,w)=f_{X,Y}\\big(h_1(z,w),\\,h_2(z,w)\\big)\\,\\lvert J\\rvert,\\qquad f_Z(z)=\\int f_{Z,W}(z,w)\\,dw", "rels": ["雅可比行列式", "单调变换密度法", "卷积公式", "常见二元变换", "联合密度函数", "边缘密度-连续"]}, {"id": "多峰分布", "type": "c", "level": "basic", "chapter": "l10", "en": "MultimodalDistribution", "def": "概率函数有多个取值并列最高的分布——这些点都是众数(众数不唯一);两个峰的叫双峰(bimodal)。常由两个子总体混合而成(如男/女鞋码混在一起)。", "formula": "f(x_1^{*})=f(x_2^{*})=\\max_x f(x),\\qquad x_1^{*}\\neq x_2^{*}", "rels": ["众数", "期望", "偏度"]}, {"id": "多项分布", "type": "c", "level": "hard", "chapter": "l17", "en": "MultinomialDistribution", "def": "每次试验有 \\(k\\) 类结果(概率 \\(p_0,\\dots,p_{k-1}\\),和为 1),\\(n\\) 次独立试验中各类出现次数 \\((X_0,\\dots,X_{k-1})\\) 的联合分布。二项是 \\(k=2\\) 的特例;\\(k=3\\) 称三项(trinomial)分布。", "formula": "P[X_0=i_0,\\dots,X_{k-1}=i_{k-1}]=\\frac{n!}{i_0!\\,i_1!\\cdots i_{k-1}!}\\;p_0^{\\,i_0}p_1^{\\,i_1}\\cdots p_{k-1}^{\\,i_{k-1}}\\qquad\\Big(\\sum_j i_j=n\\Big)", "rels": ["二项分布", "排列", "联合分布", "协方差"]}, {"id": "容斥原理", "type": "c", "level": "basic", "chapter": "l01", "en": "InclusionExclusionPrinciple", "def": "求并集的概率(或计数)时,把各集合直接相加会把重叠部分重复计入,需按\"加单个 − 减两两交 + 加三集合交 − …\"正负交替修正。考试最多到三集合。", "formula": "P[A\\cup B]=P[A]+P[B]-P[A\\cap B]", "rels": ["互斥事件", "概率公理", "德摩根定律"]}, {"id": "常见二元变换", "type": "c", "level": "advanced", "chapter": "l35", "en": "CommonBivariateTransformations", "def": "三大常考二元变换——商 \\(X/Y\\)、积 \\(XY\\)、和 \\(X+Y\\)——的标准操作速查:各自怎么补 W、逆变换长什么样、\\(|J|\\) 是多少。设置背熟,雅可比法就只剩画支撑和机械积分。", "formula": "Z=\\frac XY:\\ x=zw,\\ \\lvert J\\rvert=w\\qquad\\quad Z=XY:\\ x=\\frac zw,\\ \\lvert J\\rvert=\\frac1w\\qquad\\quad Z=X+Y:\\ x=z-w,\\ \\lvert J\\rvert=1", "rels": ["多变量变换的雅可比法", "雅可比行列式", "卷积公式", "联合均匀分布", "区域概率与积分限"]}, {"id": "常见分布MGF", "type": "c", "level": "basic", "chapter": "l32", "en": "CommonDistributionMGFs", "def": "常见分布 MGF 的必背速查表(ASM Table 32.1)。考试给一个闭式 MGF,考的往往是\"认不认得出它是谁\"——由唯一性,认出形状 = 认出分布,均值方差随之免费得到。", "formula": "\\text{二项 }(1-p+pe^{t})^{n}\\qquad \\text{泊松 }e^{\\lambda(e^{t}-1)}\\qquad \\text{指数 }\\frac{1}{1-\\theta t}\\qquad \\text{伽马 }\\frac{1}{(1-\\theta t)^{\\alpha}}\\qquad \\text{正态 }e^{\\mu t+\\sigma^{2}t^{2}/2}", "rels": ["矩母函数", "MGF唯一性", "指数分布", "伽马分布", "正态分布", "泊松分布"]}, {"id": "德摩根定律", "type": "c", "level": "basic", "chapter": "l01", "en": "DeMorgansLaws", "def": "对并集 / 交集取补时,$\\cup$ 与 $\\cap$ 必须互换。口诀:\"非(A 或 B)= 非A 且 非B\"。", "formula": "(A\\cup B)'=A'\\cap B' \\qquad (A\\cap B)'=A'\\cup B'", "rels": ["容斥原理", "互斥事件", "概率公理"]}, {"id": "指数与泊松过程", "type": "c", "level": "advanced", "chapter": "l20", "en": "PoissonInterarrivalTime", "def": "同一枚硬币的两面:事件按速率 \\(\\lambda\\) 的泊松过程发生时,固定区间内的计数服从泊松,相邻两事件的间隔时间服从速率 \\(\\lambda\\)(均值 \\(1/\\lambda\\))的指数分布——计数用泊松,间隔用指数。", "formula": "P[\\text{下一事件的等待}>t]=P[\\,[0,t]\\text{ 内 }0\\text{ 次事件}\\,]=e^{-\\lambda t}", "rels": ["泊松过程", "泊松分布", "指数分布", "生存函数", "伽马分布"]}, {"id": "指数分布", "type": "c", "level": "basic", "chapter": "l20", "en": "ExponentialDistribution", "def": "描述\"下一次事件到来前要等多久\"的连续分布(\\(x\\ge 0\\)):寿命、等待时间、保险损失额的默认模型。事件以恒定速率随机来临,等待密度从峰值起持续衰减——刚开始最可能马上来,越拖概率越小。Exam P 最高频的连续分布。", "formula": "F(x)=1-e^{-x/\\theta},\\qquad f(x)=\\frac{e^{-x/\\theta}}{\\theta},\\qquad S(x)=e^{-x/\\theta}\\quad(x\\ge 0)", "rels": ["指数分布的矩", "指数分布百分位数", "无记忆性", "指数与泊松过程", "伽马分布", "几何分布"]}, {"id": "指数分布百分位数", "type": "c", "level": "basic", "chapter": "l20", "en": "ExponentialPercentiles", "def": "指数分布的分位数有闭式:令 \\(F(\\xi_p)=p\\) 一步解出,无需积分。SOA 很爱直接考中位数或某个百分位。", "formula": "\\xi_p=-\\theta\\ln(1-p)", "rels": ["指数分布", "百分位数", "中位数", "累积分布函数", "正态百分位数"]}, {"id": "指数分布的矩", "type": "c", "level": "basic", "chapter": "l20", "en": "ExponentialMoments", "def": "指数分布(均值参数 \\(\\theta\\))的矩全是闭式:方差 = 均值²,标准差 = 均值——记住这一句,方差、二阶矩全跟着出来。", "formula": "E[X]=\\theta=\\frac1\\lambda,\\qquad \\operatorname{Var}(X)=\\theta^2=\\frac1{\\lambda^2},\\qquad E[X^2]=2\\theta^2", "rels": ["指数分布", "期望", "方差", "标准差", "变异系数", "伽马分布"]}, {"id": "排列", "type": "c", "level": "basic", "chapter": "l02", "en": "Permutation", "def": "从 $n$ 个不同对象中取 $r$ 个,讲究顺序地排成一列的方式数。顺序不同视为不同方案。", "formula": "_nP_r=\\frac{n!}{(n-r)!}", "rels": ["组合", "等可能模型"]}, {"id": "方差", "type": "c", "level": "basic", "chapter": "l08", "en": "Variance", "def": "随机变量取值围绕均值摆动幅度的度量:偏差平方的期望(即二阶中心矩),记 \\(\\operatorname{Var}(X)\\) 或 \\(\\sigma^2\\)。方差 \\(\\ge 0\\),越大分布越分散;为 0 当且仅当 \\(X\\) 几乎处处是常数。", "formula": "\\operatorname{Var}(X)=E\\big[(X-\\mu)^2\\big]=E[X^2]-\\mu^2", "rels": ["期望", "矩", "标准差", "伯努利分布", "和的方差", "协方差"]}, {"id": "无记忆性", "type": "c", "level": "advanced", "chapter": "l20", "en": "MemorylessProperty", "def": "指数分布的灵魂性质:已经等了多久,对\"还要再等多久\"毫无影响。已亮 5000 小时的旧灯泡与新灯泡剩余寿命同分布。指数是唯一无记忆的连续分布(离散阵营的唯一是几何)。", "formula": "P[X>s+t\\mid X>s]=P[X>t]\\qquad(s,t\\ge 0)", "rels": ["指数分布", "几何分布无记忆性", "免赔额与正赔付条件", "生存函数", "条件概率", "条件方差"]}, {"id": "最大值分布", "type": "c", "level": "advanced", "chapter": "l23", "en": "SampleMaximum", "def": "n 个 iid 随机变量的最大值 \\(Y=\\max(X_1,\\dots,X_n)=X_{(n)}\\) 的分布。核心等价一步:「最大 ≤ x」⟺「每一个 \\(X_i\\) 都 ≤ x」,独立性让 CDF 直接连乘 n 次。", "formula": "F_{\\max}(x)=\\big(F_X(x)\\big)^n,\\qquad f_{\\max}(x)=n\\big(F_X(x)\\big)^{n-1}f_X(x)", "rels": ["次序统计量", "最小值分布", "第k个次序统计量", "累积分布函数", "随机变量独立性"]}, {"id": "最小值分布", "type": "c", "level": "advanced", "chapter": "l23", "en": "SampleMinimum", "def": "n 个 iid 随机变量的最小值 \\(Y=\\min(X_1,\\dots,X_n)=X_{(1)}\\) 的分布。CDF 不好直接写,走对偶:「最小 > x」⟺「全体 > x」,先连乘生存函数,再补成 CDF。", "formula": "S_{\\min}(x)=\\big(1-F_X(x)\\big)^n,\\qquad F_{\\min}(x)=1-\\big(1-F_X(x)\\big)^n,\\qquad f_{\\min}(x)=n\\big(1-F_X(x)\\big)^{n-1}f_X(x)", "rels": ["次序统计量", "最大值分布", "生存函数", "指数分布", "第k个次序统计量"]}, {"id": "期望", "type": "c", "level": "basic", "chapter": "l07", "en": "ExpectedValue", "def": "分布最核心的一个数:所有可能取值以概率为权重的加权平均,记 \\(E[X]=\\mu\\)。几何上是密度面积的质心(平衡点)——把概率想成质量,\\(\\mu\\) 就是支起整片面积不倾倒的支点。", "formula": "E[X]=\\sum_x x\\,p(x)\\qquad\\qquad E[X]=\\int_{-\\infty}^{\\infty}x\\,f(x)\\,dx", "rels": ["随机变量", "概率函数", "概率密度函数", "LOTUS", "期望的线性", "方差"]}, {"id": "期望的线性", "type": "c", "level": "basic", "chapter": "l07", "en": "LinearityOfExpectation", "def": "期望算子对线性运算\"透明\":常数可提出、加法可拆开。关键在于 \\(E[X+Y]=E[X]+E[Y]\\) 对任意随机变量恒成立,不要求独立。", "formula": "E[aX+b]=a\\,E[X]+b\\qquad E[X+Y]=E[X]+E[Y]", "rels": ["期望", "LOTUS", "独立与乘积期望", "和的方差"]}, {"id": "条件分布(二元正态)", "type": "c", "level": "hard", "chapter": "l31", "en": "ConditionalDistributionOfBivariateNormal", "def": "二元正态里给定 \\(Y=y\\),\\(X\\) 仍是正态:均值随 \\(y\\) 线性变化(回归线),方差恒定、被压小因子 \\(1-\\rho^2\\)、不含 \\(y\\)。本章几乎唯一的考点。", "formula": "X\\mid Y=y\\ \\sim\\ N\\!\\Big(\\mu_X+\\rho\\,\\frac{\\sigma_X}{\\sigma_Y}\\,(y-\\mu_Y),\\ \\ \\sigma_X^2\\,(1-\\rho^2)\\Big)", "rels": ["二元正态分布", "连续型条件期望", "连续型条件方差", "条件密度函数", "相关系数", "标准化"]}, {"id": "条件分布", "type": "c", "level": "basic", "chapter": "l14", "en": "ConditionalDistribution", "def": "在 \\(Y=y\\) 的切片上,\\(X\\) 的重新归一化分布:联合分布除以边际。分母恰好把切片总量除回 1,得到的是正当概率分布,一切矩公式原封不动搬过来用。", "formula": "f_{X\\mid Y}[x\\mid Y=y]=\\frac{f(x,y)}{f_Y(y)}", "rels": ["联合分布", "边缘分布", "条件概率", "条件期望", "条件方差", "条件密度函数"]}, {"id": "条件密度与条件pmf", "type": "c", "level": "advanced", "chapter": "l06", "en": "ConditionalDensityGivenEvent", "def": "给定事件 A 后 X 的新分布长什么样:A 外归零,A 内同除 \\(P[A]\\)。先截断(A 外清零)、再归一(整体抬高 \\(1/P[A]\\) 倍),让总量重新等于 1——学名\"截断分布\"。", "formula": "f_{X\\mid A}(x)=\\begin{cases}\\dfrac{f(x)}{P[A]}, & x\\in A\\\\[6pt]0, & x\\notin A\\end{cases}\\qquad p_{X\\mid A}(x)=\\frac{p_X(x)}{P[A]}\\;(x\\in A)", "rels": ["随机变量的条件分布", "概率密度函数", "概率函数", "条件密度函数", "免赔额与正赔付条件"]}, {"id": "条件密度函数", "type": "c", "level": "basic", "chapter": "l29", "en": "ConditionalDensityFunction", "def": "在 \\(Y=y\\) 已知下 \\(X\\) 的密度:把联合密度沿 \\(Y=y\\) 切一刀,截面曲线除以该处边缘密度 \\(f_Y(y)\\) 归一化。连续变量 \\(P[Y=y]=0\\),事件版条件概率失效,改用密度之比。", "formula": "f_{X\\mid Y}(x\\mid y)=\\frac{f(x,y)}{f_Y(y)}\\qquad\\big(f_Y(y)>0\\big)", "rels": ["联合密度函数", "边缘密度-连续", "条件密度与条件pmf", "连续型条件概率", "连续型条件期望", "贝叶斯定理-连续"]}, {"id": "条件方差", "type": "c", "level": "advanced", "chapter": "l14", "en": "ConditionalVariance", "def": "给定条件下 \\(X\\) 的方差:与无条件方差公式同构(二阶矩减一阶矩平方),但所有期望都换成条件版本、权重全用条件分布。", "formula": "\\operatorname{Var}(X\\mid Y=y)=E[X^2\\mid Y=y]-\\big(E[X\\mid Y=y]\\big)^2", "rels": ["条件分布", "条件期望", "条件矩", "方差", "全方差公式", "连续型条件方差"]}, {"id": "条件期望", "type": "c", "level": "basic", "chapter": "l14", "en": "ConditionalExpectation", "def": "给定条件下 \\(X\\) 的平均值:用条件分布作权重求出的期望。以 \\(Y=y\\) 为条件时结果里还带着 \\(y\\)——它是 \\(y\\) 的函数;代入具体 \\(y\\) 是一个数,保留 \\(Y\\) 不代值则升级为随机变量。", "formula": "E[X\\mid Y=y]=\\sum_{x}x\\,\\frac{f(x,y)}{f_Y(y)}\\;=\\;\\int_{x} x\\,\\frac{f(x,y)}{f_Y(y)}\\,dx", "rels": ["条件分布", "条件矩", "期望", "条件期望是随机变量", "全期望公式", "连续型条件期望"]}, {"id": "条件期望是随机变量", "type": "c", "level": "advanced", "chapter": "l16", "en": "ConditionalExpectationAsRandomVariable", "def": "\\(E[X\\mid Y=y]\\) 代入具体 \\(y\\) 后是一个数;不固定 \\(Y\\) 时,\\(E[X\\mid Y]\\) 是函数 \\(y\\mapsto E[X\\mid Y=y]\\) 作用在随机的 \\(Y\\) 上,因而本身是随机变量,继承 \\(Y\\) 的随机性。全期望 / 全方差公式正建立在\"能再对它求期望、方差\"这一点上。", "formula": "E[X\\mid Y]=h(Y),\\quad h(y)=E[X\\mid Y=y];\\qquad \\operatorname{Var}(X\\mid Y)\\ \\text{同理是随机变量}", "rels": ["条件期望", "随机变量", "全期望公式", "全方差公式", "条件方差"]}, {"id": "条件概率", "type": "c", "level": "basic", "chapter": "l03", "en": "ConditionalProbability", "def": "在事件 B 已发生的前提下,事件 A 发生的概率。把样本空间缩小到 B(B 成为新的\"全体\"),A 剩下的部分是 \\(A\\cap B\\),再除以 \\(P[B]\\) 归一化。", "formula": "P[A\\mid B]=\\frac{P[A\\cap B]}{P[B]}\\qquad(P[B]\\neq 0)", "rels": ["乘法公式", "事件独立性", "贝叶斯定理", "全概率公式", "连续型条件概率", "随机变量的条件分布"]}, {"id": "条件矩", "type": "c", "level": "basic", "chapter": "l14", "en": "ConditionalMoment", "def": "随机变量在给定条件(事件 \\(A\\) 或 \\(Y=y\\))下的矩:把落在条件区域里的概率重新归一化,拿它当权重求 \\(E[g(X)]\\)。条件分布是正当的概率分布,故均值、方差等一切矩照常可求。", "formula": "E[g(X)\\mid A]=\\sum_{x\\ \\text{满足}\\ A}\\frac{g(x)\\,P[X=x]}{P[A]}\\;=\\;\\int_{x\\ \\text{满足}\\ A}\\frac{g(x)\\,f_X(x)}{P[A]}\\,dx", "rels": ["条件概率", "随机变量的条件分布", "条件期望", "条件方差", "矩", "连续型条件矩"]}, {"id": "标准化", "type": "c", "level": "basic", "chapter": "l21", "en": "Standardization", "def": "把 \\(X\\) 减均值、除标准差得到标准正态 \\(Z\\),于是任何正态概率都化成 \\(\\Phi\\) 查表——正态章的全部解题动作归于这一招。", "formula": "Z=\\frac{X-\\mu}{\\sigma}\\sim N(0,1),\\qquad F_X(x)=P[X\\le x]=\\Phi\\!\\left(\\frac{x-\\mu}{\\sigma}\\right)", "rels": ["正态分布", "标准正态分布", "正态的线性组合", "正态百分位数", "中心极限定理"]}, {"id": "标准差", "type": "c", "level": "basic", "chapter": "l08", "en": "StandardDeviation", "def": "方差的正平方根 \\(\\sigma\\),把离散程度的单位还原到与 \\(X\\) 同量纲(方差的单位是 \\(X\\) 的平方),便于与取值直接比较。", "formula": "\\sigma=\\sqrt{\\operatorname{Var}(X)}\\ \\ge 0", "rels": ["方差", "变异系数", "标准化", "68-95-99.7法则"]}, {"id": "标准正态分布", "type": "c", "level": "basic", "chapter": "l21", "en": "StandardNormalDistribution", "def": "均值 0、方差 1 的正态分布 \\(Z\\sim N(0,1)\\):所有正态的\"基准版\"。密度记 \\(\\phi\\)、累积分布记 \\(\\Phi\\)——查表查的就是 \\(\\Phi\\)。", "formula": "\\phi(x)=\\frac{e^{-x^2/2}}{\\sqrt{2\\pi}},\\qquad \\Phi(z)=P[Z\\le z]", "rels": ["正态分布", "标准化", "累积分布函数", "正态百分位数", "68-95-99.7法则"]}, {"id": "样本均值分布", "type": "c", "level": "advanced", "chapter": "l22", "en": "SampleMeanDistribution", "def": "\\(n\\) 个 iid(\\(\\mu,\\sigma^2\\))随机变量的样本均值 \\(\\bar X=\\frac1n\\sum X_i\\) 的分布:期望仍是 \\(\\mu\\)、方差缩成 \\(\\sigma^2/n\\)——这两条是精确恒等式(不是近似);\\(n\\) 大时由 CLT 整个分布近似正态。", "formula": "E[\\bar X]=\\mu,\\qquad \\operatorname{Var}(\\bar X)=\\frac{\\sigma^2}{n},\\qquad \\bar X\\ \\approx\\ N\\!\\Big(\\mu,\\ \\frac{\\sigma^2}{n}\\Big)", "rels": ["中心极限定理", "和的正态近似", "期望的线性", "和的方差", "正态的线性组合", "标准化"]}, {"id": "概率公理", "type": "c", "level": "basic", "chapter": "l01", "en": "ProbabilityAxioms", "def": "概率是给事件赋一个 $0\\sim 1$ 的数,须满足三条公理: 1. 非负:$P[A]\\ge 0$ 2. 规范:$P[\\Omega]=1$ 3. 可数可加:可数个互斥事件之并的概率 = 各概率之和", "formula": "P[A]\\le 1 \\qquad P[A']=1-P[A] \\qquad P[A\\cap B]\\le P[A]", "rels": ["互斥事件", "容斥原理", "德摩根定律"]}, {"id": "概率函数", "type": "c", "level": "basic", "chapter": "l05", "en": "ProbabilityMassFunction", "def": "离散随机变量的刻画工具:一张\"点 → 概率\"的表,\\(p(x)=P[X=x]\\)。离散分布由它完全决定,又叫概率质量函数(pmf)。", "formula": "p(x)=P[X=x]\\qquad p(x)\\ge 0,\\quad \\sum_{\\text{all }x}p(x)=1", "rels": ["随机变量", "概率密度函数", "累积分布函数", "期望", "离散均匀分布"]}, {"id": "概率密度函数", "type": "c", "level": "basic", "chapter": "l05", "en": "ProbabilityDensityFunction", "def": "连续随机变量的刻画工具:概率是密度曲线下方的面积,想要区间概率就积分。密度是分布函数的导数 \\(f(x)=F'(x)\\)。", "formula": "P[a\\le X\\le b]=\\int_a^b f(x)\\,dx\\qquad f(x)\\ge 0,\\quad\\int_{-\\infty}^{\\infty}f(x)\\,dx=1", "rels": ["随机变量", "概率函数", "累积分布函数", "期望", "积分限与支撑", "连续均匀分布"]}, {"id": "概率母函数", "type": "c", "level": "basic", "chapter": "l33", "en": "ProbabilityGeneratingFunction", "def": "对非负整数取值的随机变量(计数变量:泊松、二项、几何……),把每个概率 \\(p_k=P[X{=}k]\\) 当系数、配上 \\(t^k\\) 求和得到的函数 \\(P_X(t)=E[t^X]\\)——一个函数装下整张概率表。连续型或取负值的变量不适用。", "formula": "P_X(t)=E\\!\\left[t^{X}\\right]=\\sum_{k=0}^{\\infty}t^{k}\\,P[X{=}k]", "rels": ["矩母函数", "阶乘矩", "母函数生成概率", "独立和的母函数", "PGF与MGF关系", "泊松分布"]}, {"id": "次序统计量", "type": "c", "level": "basic", "chapter": "l23", "en": "OrderStatistic", "def": "把 iid 样本 \\(X_1,\\dots,X_n\\) 由小到大排序,排在第 k 位的随机变量记 \\(X_{(k)}\\),称第 k 个次序统计量;\\(X_{(1)}\\) 是最小值、\\(X_{(n)}\\) 是最大值。样本随机,排序结果随之而定,所以每个 \\(X_{(k)}\\) 本身仍是随机变量。", "formula": "X_{(1)}\\le X_{(2)}\\le\\cdots\\le X_{(n)},\\qquad X_{(1)}=\\min_i X_i,\\quad X_{(n)}=\\max_i X_i", "rels": ["最大值分布", "最小值分布", "第k个次序统计量", "随机变量独立性", "累积分布函数"]}, {"id": "正态分布", "type": "c", "level": "basic", "chapter": "l21", "en": "NormalDistribution", "def": "钟形、关于均值对称的连续分布,由均值 \\(\\mu\\)(峰位)与方差 \\(\\sigma^2\\)(胖瘦)完全刻画,记 \\(X\\sim N(\\mu,\\sigma^2)\\)。大量独立小因素之和都近似正态(身高、测量误差、理赔总额),故为精算最常出现的分布。", "formula": "f(x)=\\frac{e^{-(x-\\mu)^2/2\\sigma^2}}{\\sigma\\sqrt{2\\pi}},\\qquad -\\infty<x<\\infty", "rels": ["标准正态分布", "标准化", "正态百分位数", "正态的线性组合", "中心极限定理", "二元正态分布"]}, {"id": "正态百分位数", "type": "c", "level": "basic", "chapter": "l21", "en": "NormalPercentiles", "def": "标准化的逆运算:给概率 \\(p\\) 求 \\(x\\)。先在表体里反查出标准正态分位 \\(z_p\\)(满足 \\(\\Phi(z_p)=p\\)),再放大还原到 \\(X\\)。", "formula": "\\xi_p=\\mu+\\sigma z_p,\\qquad \\Phi(z_p)=p", "rels": ["百分位数", "标准正态分布", "标准化", "正态分布", "指数分布百分位数"]}, {"id": "正态的线性组合", "type": "c", "level": "advanced", "chapter": "l21", "en": "LinearCombinationOfNormals", "def": "正态经过任何线性变换、独立正态相加相减,结果还是正态——只需算出新分布的均值和方差,又能标准化查表。本章最有威力的性质。", "formula": "aX+b\\sim N\\!\\big(a\\mu+b,\\ a^2\\sigma^2\\big);\\qquad aX+bY\\sim N\\!\\big(a\\mu_X+b\\mu_Y,\\ \\ a^2\\sigma_X^2+b^2\\sigma_Y^2\\big)\\ (X,Y\\text{ 独立})", "rels": ["正态分布", "和的方差", "协方差", "随机变量独立性", "样本均值分布", "和的正态近似"]}, {"id": "母函数生成概率", "type": "c", "level": "basic", "chapter": "l33", "en": "ProbabilitiesFromPGF", "def": "从概率母函数反读概率:PGF 是幂级数 \\(\\sum_k p_k t^k\\),第 k 项系数就是 \\(p_k\\)——在 \\(t=0\\) 处求 k 阶导、除以 \\(k!\\) 即得 \\(P[X{=}k]\\)。", "formula": "P[X{=}k]=\\frac{P^{(k)}(0)}{k!}\\qquad\\text{特别地 }P(0)=p_0", "rels": ["概率母函数", "阶乘矩", "概率函数", "矩母函数"]}, {"id": "泊松众数", "type": "c", "level": "advanced", "chapter": "l19", "en": "PoissonMode", "def": "泊松相邻概率之比是 \\(\\lambda/k\\):比值 \\(>1\\)(\\(k<\\lambda\\))时概率上升、越过 \\(\\lambda\\) 后下降,故众数 \\(=\\lfloor\\lambda\\rfloor\\);\\(\\lambda\\) 恰为整数时 \\(\\lambda-1\\) 与 \\(\\lambda\\) 并列双众数。", "formula": "\\frac{P[X=k]}{P[X=k-1]}=\\frac{\\lambda}{k}\\quad\\Longrightarrow\\quad P[X=k]=\\frac{\\lambda}{k}\\,P[X=k-1]", "rels": ["泊松分布", "众数", "泊松分布的矩"]}, {"id": "泊松分布", "type": "c", "level": "basic", "chapter": "l19", "en": "PoissonDistribution", "def": "刻画\"固定区间内某事件发生几次\"的单参数计数分布:事故、来电、索赔件数的默认模型。由二项分布在 \\(n\\to\\infty,\\ p\\to 0,\\ np\\to\\lambda\\) 的极限得到,天然适合\"机会极多、每次极小\"的场景。", "formula": "P[X=k]=\\frac{e^{-\\lambda}\\lambda^{k}}{k!},\\qquad k=0,1,2,\\dots", "rels": ["泊松分布的矩", "泊松可加性", "泊松过程", "泊松逼近二项", "二项分布", "指数分布"]}, {"id": "泊松分布的矩", "type": "c", "level": "basic", "chapter": "l19", "en": "PoissonMeanAndVariance", "def": "泊松分布最\"招牌\"的性质:均值和方差相等,都等于参数 \\(\\lambda\\)。这是判别一个计数是否泊松、以及由标准差反推参数的关键。", "formula": "E[X]=\\lambda,\\qquad \\operatorname{Var}(X)=\\lambda,\\qquad SD(X)=\\sqrt{\\lambda}", "rels": ["泊松分布", "期望", "方差", "标准差", "二项分布的期望与方差", "泊松众数"]}, {"id": "泊松可加性", "type": "c", "level": "basic", "chapter": "l19", "en": "PoissonAdditivity", "def": "相互独立的泊松随机变量之和仍是泊松,参数直接相加——合并多个独立泊松源(多路口事故、多天来电、多张保单)时无需卷积。", "formula": "N_i\\sim\\text{Poisson}(\\lambda_i)\\ \\text{独立}\\quad\\Longrightarrow\\quad \\sum_{i=1}^{n}N_i\\;\\sim\\;\\text{Poisson}\\!\\left(\\sum_{i=1}^{n}\\lambda_i\\right)", "rels": ["泊松分布", "泊松过程", "二项分布可加性", "负二项分布可加性", "独立和的母函数", "卷积公式"]}, {"id": "泊松过程", "type": "c", "level": "advanced", "chapter": "l19", "en": "PoissonProcess", "def": "事件以恒定速率 \\(\\lambda\\)(每单位时间)随机、独立地发生的过程。长度 \\(t\\) 的区间内的计数服从 \\(\\text{Poisson}(\\lambda t)\\);若每个事件再独立地以概率 \\(p\\) 归入某子类,该子类计数服从 \\(\\text{Poisson}(\\lambda p)\\)(稀释/thinning),且不同子类相互独立。", "formula": "N(t)\\sim\\text{Poisson}(\\lambda t),\\qquad N_{\\text{子类}}\\sim\\text{Poisson}(\\lambda p)", "rels": ["泊松分布", "指数分布", "指数与泊松过程", "泊松可加性", "伽马分布"]}, {"id": "泊松逼近二项", "type": "c", "level": "basic", "chapter": "l19", "en": "PoissonApproximationToBinomial", "def": "当试验次数 \\(n\\) 很大、单次成功概率 \\(p\\) 很小、\\(np\\) 适中时,二项分布近似于参数 \\(\\lambda=np\\) 的泊松分布——省掉庞大的组合数计算。", "formula": "\\binom{n}{k}p^{k}(1-p)^{n-k}\\;\\approx\\;\\frac{e^{-\\lambda}\\lambda^{k}}{k!},\\qquad \\lambda=np", "rels": ["二项分布", "泊松分布", "泊松分布的矩", "伯努利分布"]}, {"id": "混合型随机变量", "type": "c", "level": "advanced", "chapter": "l06", "en": "MixedRandomVariable", "def": "既有离散质量点(如\"零损失\"这一点有正概率)又有连续密度的随机变量——离散、连续之外的第三类。保险损失是典型:\\(P[X=0]=0.8\\),其余 0.2 摊在正半轴上。", "formula": "P[\\text{目标}]=P[X>0]\\cdot P[\\text{目标}\\mid X>0]", "rels": ["随机变量", "乘法公式", "随机变量的条件分布", "累积分布函数", "免赔额与正赔付条件"]}, {"id": "混合矩", "type": "c", "level": "basic", "chapter": "l12", "en": "MixedMoment", "def": "取 \\(g(x,y)=xy\\)(一般 \\(x^ay^b\\))的联合矩,最重要的是 \\(E[XY]\\)——下一章协方差 \\(\\operatorname{Cov}(X,Y)=E[XY]-E[X]E[Y]\\) 的核心零件。", "formula": "E[XY]=\\sum_x\\sum_y xy\\,p(x,y)=\\iint xy\\,f(x,y)\\,dx\\,dy\\qquad E[X^aY^b]=\\sum_x\\sum_y x^ay^b\\,p(x,y)", "rels": ["联合矩", "协方差", "独立与乘积期望", "矩", "相关系数"]}, {"id": "独立与不相关", "type": "c", "level": "advanced", "chapter": "l13", "en": "IndependenceVsUncorrelatedness", "def": "独立与\"协方差为零(不相关)\"是强弱不同的两个概念:独立 ⇒ Cov=0,但 Cov=0 推不出独立。协方差只度量线性关系,变量可以有极强的非线性依赖而协方差为零。", "formula": "X,Y\\ \\text{独立}\\ \\Longrightarrow\\ E[XY]=E[X]E[Y]\\ \\Longrightarrow\\ \\operatorname{Cov}(X,Y)=0;\\qquad \\operatorname{Cov}(X,Y)=0\\ \\not\\!\\!\\Longrightarrow\\ X,Y\\ \\text{独立}", "rels": ["协方差", "事件独立性", "随机变量独立性", "相关系数", "独立与乘积期望", "零相关即独立(正态特有)"]}, {"id": "独立与乘积期望", "type": "c", "level": "advanced", "chapter": "l27", "en": "ExpectationOfProductOfIndependentVariables", "def": "当 \\(X\\perp Y\\)(密度可因式分解且支撑矩形)时,乘积的期望才等于期望的乘积:\\(E[g(X)h(Y)]=E[g(X)]\\,E[h(Y)]\\)。二重积分自动拆成两个一重积分之积,不必真积二维。", "formula": "X\\perp Y\\;\\Longrightarrow\\;E[g(X)\\,h(Y)]=E[g(X)]\\,E[h(Y)]", "rels": ["连续型独立判据", "连续型联合矩", "独立与不相关", "期望的线性"]}, {"id": "独立和的MGF", "type": "c", "level": "advanced", "chapter": "l32", "en": "MGFOfIndependentSum", "def": "独立随机变量之和的 MGF 等于各自 MGF 的乘积——\"加法变乘法\",免掉卷积积分。独立是前提,不独立时期望不能拆成乘积。", "formula": "X\\perp Y\\ \\Longrightarrow\\ M_{X+Y}(t)=M_X(t)\\,M_Y(t)", "rels": ["矩母函数", "MGF唯一性", "独立和的母函数", "随机变量独立性", "独立与乘积期望", "卷积公式"]}, {"id": "独立和的母函数", "type": "c", "level": "advanced", "chapter": "l33", "en": "PGFOfIndependentSum", "def": "独立(非负整数)随机变量之和的母函数等于各自母函数的乘积。多项式乘法恰好把\"指数相加、系数相乘再汇总\"全做了——多项式乘法 = 自动卷积,这正是\"独立和相乘\"的直觉。", "formula": "X\\perp Y\\ \\Longrightarrow\\ P_{X+Y}(t)=P_X(t)\\,P_Y(t)", "rels": ["概率母函数", "独立和的MGF", "随机变量独立性", "泊松可加性", "卷积公式"]}, {"id": "生存函数", "type": "c", "level": "basic", "chapter": "l05", "en": "SurvivalFunction", "def": "\\(S(x)=P[X>x]\\):\"活过 x / 损失超过 x\"的概率,与分布函数互补 \\(S=1-F\\)。精算里描述寿命、损失尾部全靠它。", "formula": "S(x)=P[X>x]=1-F(x)", "rels": ["累积分布函数", "生存函数求期望", "免赔额与正赔付条件", "指数分布"]}, {"id": "生存函数求期望", "type": "c", "level": "advanced", "chapter": "l07", "en": "ExpectedValueViaSurvivalFunction", "def": "非负随机变量的期望 = 生存函数下的面积:对 \\(1-F\\) 积分,不必先求密度再乘 x。分布函数已知、密度不好求时的捷径,考试极爱考。", "formula": "E[X]=\\int_0^\\infty\\big(1-F(x)\\big)\\,dx=\\int_0^\\infty S(x)\\,dx\\qquad E[X]=\\sum_{k\\ge 0}P[X>k]\\ (\\text{离散非负整数})", "rels": ["生存函数", "期望", "累积分布函数", "免赔额与正赔付条件"]}, {"id": "百分位数", "type": "c", "level": "advanced", "chapter": "l09", "en": "Percentile", "def": "\\(100p\\) 分位数 \\(\\pi_p\\) 是让累积分布函数首次达到或超过 \\(p\\) 的最小取值——把\"中位数对半劈\"推广到任意比例 \\(p\\) 的位置度量。严格写法用 \\(\\ge\\),连续、离散通吃。", "formula": "\\pi_p=\\min\\{x:\\ F(x)\\ge p\\}\\qquad P[X\\le\\pi_p]\\ge p\\ \\text{ 且 }\\ P[X\\ge\\pi_p]\\ge 1-p", "rels": ["累积分布函数", "中位数", "四分位数", "均匀分布的分位数", "正态百分位数", "指数分布百分位数"]}, {"id": "相关系数", "type": "c", "level": "basic", "chapter": "l13", "en": "CorrelationCoefficient", "def": "协方差除以两个标准差得到的无量纲线性关联度,取值恒在 \\([-1,1]\\)。协方差大小受量纲影响、不好横向比较,归一化后只剩纯\"线性关系的方向与强度\"。", "formula": "\\rho=\\operatorname{Corr}(X,Y)=\\frac{\\operatorname{Cov}(X,Y)}{\\sigma_X\\,\\sigma_Y}=\\frac{\\operatorname{Cov}(X,Y)}{\\sqrt{\\operatorname{Var}(X)\\operatorname{Var}(Y)}}\\in[-1,1]", "rels": ["协方差", "标准差", "独立与不相关", "和的方差", "二元正态分布"]}, {"id": "矩", "type": "c", "level": "basic", "chapter": "l08", "en": "Moment", "def": "把期望作用到 \\(X\\) 的幂(原点矩)或偏差的幂(中心矩)得到的一族量,逐阶刻画分布的中心、散度、偏斜与尖峰。名字借自力学的力矩/转动惯量。", "formula": "\\mu_n'=E[X^n]\\qquad\\qquad \\mu_n=E\\big[(X-\\mu)^n\\big]", "rels": ["期望", "方差", "偏度", "矩母函数", "联合矩"]}, {"id": "矩形区域概率", "type": "c", "level": "advanced", "chapter": "l11", "en": "RectangleProbability", "def": "用联合 cdf 的容斥求半开矩形 \\((a,b]\\times(c,d]\\) 的概率:\"大块减两边、补回左下角\"。是一维 \\(P[a<X\\le b]=F(b)-F(a)\\) 的二维推广。", "formula": "P[a<X\\le b,\\ c<Y\\le d]=F(b,d)-F(a,d)-F(b,c)+F(a,c)", "rels": ["联合累积分布函数", "容斥原理", "联合分布", "累积分布函数", "区域概率与积分限"]}, {"id": "矩母函数", "type": "c", "level": "basic", "chapter": "l32", "en": "MomentGeneratingFunction", "def": "随机变量 X 的矩母函数是 \\(M_X(t)=E[e^{tX}]\\):把 X 塞进 \\(e^{tX}\\) 再取期望,得到一个 t 的函数(X 已被期望积掉)。分布的全部信息被压进这一个函数——求导取矩、独立和相乘、唯一确定分布,是它的三大用途。", "formula": "M_X(t)=E\\!\\left[e^{tX}\\right]", "rels": ["MGF取矩", "独立和的MGF", "MGF唯一性", "常见分布MGF", "概率母函数", "LOTUS"]}, {"id": "离散均匀分布", "type": "c", "level": "basic", "chapter": "l15", "en": "DiscreteUniformDistribution", "def": "在 \\(n\\) 个等距整点(标准形式 \\(1,\\dots,n\\))上等概率取值的离散分布,每点概率 \\(1/n\\)。骰子是 \\(n=6\\) 的原型。", "formula": "f(x)=\\frac1n\\ (x=1,\\dots,n),\\qquad \\mathrm{E}[N]=\\frac{n+1}{2},\\qquad \\operatorname{Var}(N)=\\frac{n^2-1}{12}", "rels": ["连续均匀分布", "等可能模型", "均匀分布的矩", "概率函数"]}, {"id": "积分限与支撑", "type": "c", "level": "advanced", "chapter": "l26", "en": "LimitsOfIntegration", "def": "二维积分(区域概率、边缘密度、联合矩)的积分限不是抄 \\(\\pm\\infty\\) 或 0 到 1,而是由支撑(\\(f>0\\) 的区域)决定;支撑非矩形时,内层变量的上下限是外层变量的函数。先画支撑再定限。", "formula": "\\text{支撑 } 0\\le x\\le y\\le 1:\\qquad \\int_0^1\\!\\!\\int_x^1 f\\,dy\\,dx\\;=\\;\\int_0^1\\!\\!\\int_0^{y} f\\,dx\\,dy", "rels": ["区域概率与积分限", "边缘密度-连续", "连续型联合矩", "连续型独立判据", "联合密度函数"]}, {"id": "第k个次序统计量", "type": "c", "level": "hard", "chapter": "l23", "en": "KthOrderStatistic", "def": "iid 样本排序后第 k 小的随机变量 \\(X_{(k)}\\) 的分布;最大(k=n)、最小(k=1)都是特例。密度由\"三堆划分\"给出:要第 k 小恰落在 x,需 k−1 个样本更小、恰 1 个在 x、n−k 个更大。", "formula": "f_{X_{(k)}}(x)=\\frac{n!}{(k-1)!\\,1!\\,(n-k)!}\\,\\big(F_X(x)\\big)^{k-1}\\,f_X(x)\\,\\big(1-F_X(x)\\big)^{n-k}", "rels": ["次序统计量", "最大值分布", "最小值分布", "多项分布", "中位数", "连续均匀分布"]}, {"id": "等可能模型", "type": "c", "level": "basic", "chapter": "l01", "en": "EquallyLikelyOutcomes", "def": "当样本空间的所有基本结果等可能时,事件概率 = 有利结果数 ÷ 总结果数。即古典概率模型。", "formula": "P[E]=\\frac{\\#E}{\\#\\Omega}", "rels": ["排列", "组合", "概率公理"]}, {"id": "累积分布函数", "type": "c", "level": "advanced", "chapter": "l05", "en": "CumulativeDistributionFunction", "def": "\\(F(x)=P[X\\le x]\\):累住\"到 x 为止\"的全部概率。对离散、连续一视同仁——知道 F 就等于知道这个随机变量的一切,是求各种范围概率的统一入口。", "formula": "F(x)=P[X\\le x]\\qquad P[u<X\\le v]=F(v)-F(u)", "rels": ["随机变量", "概率函数", "概率密度函数", "生存函数", "百分位数", "联合累积分布函数"]}, {"id": "组合", "type": "c", "level": "basic", "chapter": "l02", "en": "Combination", "def": "从 $n$ 个不同对象中取 $r$ 个,不讲顺序地选出的方式数。", "formula": "_nC_r=\\binom{n}{r}=\\frac{n!}{r!\\,(n-r)!}", "rels": ["排列", "等可能模型"]}, {"id": "联合分布", "type": "c", "level": "basic", "chapter": "l11", "en": "JointDistribution", "def": "同时描述两个(或多个)随机变量的分布:给每个 \\((x,y)\\) 配概率(离散联合 pmf \\(p(x,y)\\))或密度(连续联合 pdf \\(f(x,y)\\)),非负且全空间总和/总积分为 1;累积视角是联合 cdf \\(F(x,y)=P[X\\le x,\\ Y\\le y]\\)。", "formula": "p(x,y)=P[X=x,\\ Y=y]\\qquad \\sum_x\\sum_y p(x,y)=1\\qquad \\iint f(x,y)\\,dx\\,dy=1", "rels": ["随机变量", "联合累积分布函数", "边缘分布", "随机变量独立性", "联合矩", "联合密度函数"]}, {"id": "联合均匀分布", "type": "c", "level": "basic", "chapter": "l25", "en": "JointUniformDistribution", "def": "\\((X,Y)\\) 在区域 R 上均匀分布:密度是常数 \\(1/\\text{Area}(R)\\)(面积的倒数),区域外为 0。独立的 \\(U[0,a]\\times U[0,b]\\) 是矩形特例,密度 \\(1/(ab)\\)。", "formula": "f(x,y)=\\frac{1}{\\text{Area}(R)}\\quad\\big((x,y)\\in R\\big),\\qquad f(x,y)=0\\ \\text{elsewhere}", "rels": ["连续均匀分布", "联合密度函数", "几何概率", "边缘分布是否均匀", "连续型独立判据"]}, {"id": "联合密度函数", "type": "c", "level": "basic", "chapter": "l24", "en": "JointProbabilityDensityFunction", "def": "两个连续随机变量一起看时的密度 \\(f(x,y)\\):区域上的概率由它在该区域上的二重积分给出。连续世界单点、单条线的概率为 0,只谈区域概率。", "formula": "f(x,y)\\ge 0\\qquad\\text{且}\\qquad \\iint_{\\mathbb{R}^2} f(x,y)\\,dy\\,dx=1", "rels": ["概率密度函数", "联合分布", "区域概率与积分限", "联合累积分布函数", "边缘密度-连续", "联合均匀分布"]}, {"id": "联合矩", "type": "c", "level": "basic", "chapter": "l12", "en": "JointMoment", "def": "对两个随机变量的任意函数 \\(g(X,Y)\\) 取期望所得的量:\"值 × 概率再求和\"升到二维——离散双重求和、连续二重积分。取不同的 \\(g\\) 就得到不同的联合矩。", "formula": "E[g(X,Y)]=\\sum_x\\sum_y g(x,y)\\,p(x,y)\\qquad\\qquad E[g(X,Y)]=\\iint g(x,y)\\,f(x,y)\\,dx\\,dy", "rels": ["联合分布", "LOTUS", "混合矩", "期望的线性", "协方差", "连续型联合矩"]}, {"id": "联合累积分布函数", "type": "c", "level": "advanced", "chapter": "l24", "en": "JointCumulativeDistributionFunction", "def": "\\(F(x,y)=P[X\\le x,\\ Y\\le y]\\)——\"两个都不超过\"的概率。它是联合密度从左下角一路积上来的结果,密度则是它的混合二阶偏导:pdf 与 cdf 互为微积分对偶。", "formula": "F(x,y)=\\int_{-\\infty}^{x}\\!\\!\\int_{-\\infty}^{y} f(s,t)\\,dt\\,ds,\\qquad f(x,y)=\\frac{\\partial^2 F(x,y)}{\\partial x\\,\\partial y}", "rels": ["累积分布函数", "联合密度函数", "边缘分布", "区域概率与积分限"]}, {"id": "贝叶斯定理-连续", "type": "c", "level": "hard", "chapter": "l29", "en": "BayesTheoremContinuous", "def": "把条件方向从 \\(Y\\mid X\\) 翻转成 \\(X\\mid Y\\) 的密度公式:分子 = 先验 × 似然,分母 = 同一个分子对所有可能值积分(归一化常数)。与离散贝叶斯同构。", "formula": "f_{X\\mid Y}(x\\mid y)=\\frac{f_X(x)\\,f_{Y\\mid X}(y\\mid x)}{\\displaystyle\\int_{-\\infty}^{\\infty} f_X(w)\\,f_{Y\\mid X}(y\\mid w)\\,dw}", "rels": ["贝叶斯定理", "条件密度函数", "全概率公式-连续", "先验后验概率"]}, {"id": "贝叶斯定理", "type": "c", "level": "hard", "chapter": "l04", "en": "BayesTheorem", "def": "由结果反推原因:已知结果 B 发生,原因是 \\(A_j\\) 的概率 = \\(A_j\\) 那条路径的概率,占所有通往 B 路径之和的比重。它把 \\(P[B\\mid A]\\) 方向的条件概率\"翻\"成 \\(P[A\\mid B]\\)。", "formula": "P[A_j\\mid B]=\\frac{P[A_j]\\,P[B\\mid A_j]}{\\displaystyle\\sum_{i=1}^{n}P[A_i]\\,P[B\\mid A_i]}", "rels": ["条件概率", "乘法公式", "全概率公式", "先验后验概率", "贝叶斯定理-连续"]}, {"id": "负二项分布", "type": "c", "level": "advanced", "chapter": "l18", "en": "NegativeBinomialDistribution", "def": "每次成功概率为 \\(p\\) 的独立重复试验中,第 \\(k\\) 次成功之前的失败次数 \\(N\\) 所服从的分布。与二项分布互为镜像:二项固定试验数、数成功几次;负二项固定成功数 \\(k\\)、数成功前失败几次。", "formula": "\\Pr[N=n]=\\binom{k+n-1}{n}p^k(1-p)^n,\\qquad n=0,1,2,\\dots", "rels": ["二项分布", "几何分布", "伯努利分布", "负二项分布的均值方差", "负二项分布可加性", "概率母函数"]}, {"id": "负二项分布可加性", "type": "c", "level": "basic", "chapter": "l18", "en": "NegativeBinomialAdditivity", "def": "相互独立、同一成功概率 \\(p\\) 的负二项随机变量之和仍是负二项,参数为 \\(\\{\\sum_i k_i,\\ p\\}\\)——\"等 \\(\\sum k_i\\) 次成功\"可拆成一段段独立等待的接力。", "formula": "N_i\\sim \\mathrm{NB}(k_i,\\,p)\\ \\text{独立}\\quad\\Longrightarrow\\quad \\sum_i N_i\\sim \\mathrm{NB}\\Big(\\sum_i k_i,\\ p\\Big)", "rels": ["负二项分布", "几何分布", "二项分布可加性", "泊松可加性", "独立和的母函数", "卷积公式"]}, {"id": "负二项分布的均值方差", "type": "c", "level": "basic", "chapter": "l18", "en": "NegativeBinomialMeanAndVariance", "def": "负二项随机变量(\\(N=\\) 第 \\(k\\) 次成功前的失败数)的期望与方差公式,以及\"失败数 ↔ 试验序号\"的换算规则。", "formula": "E[N]=\\frac{k(1-p)}{p},\\qquad \\operatorname{Var}(N)=\\frac{k(1-p)}{p^2}", "rels": ["负二项分布", "期望", "方差", "期望的线性", "几何分布"]}, {"id": "超几何分布", "type": "c", "level": "advanced", "chapter": "l17", "en": "HypergeometricDistribution", "def": "从 \\(N\\) 个对象(其中 \\(D\\) 个\"次品\")中不放回抽 \\(n\\) 个,抽中次品数的分布。因抽走不放回、比例随抽随变,\\(p\\) 不恒定,故不是二项——这是与二项的分水岭。", "formula": "P[X=d]=\\frac{\\dbinom{D}{d}\\dbinom{N-D}{\\,n-d\\,}}{\\dbinom{N}{n}},\\qquad E[X]=n\\frac{D}{N},\\qquad \\operatorname{Var}(X)=n\\frac{D}{N}\\cdot\\frac{N-D}{N}\\cdot\\frac{N-n}{N-1}", "rels": ["二项分布", "组合", "等可能模型", "二项分布的期望与方差"]}, {"id": "边缘分布", "type": "c", "level": "basic", "chapter": "l11", "en": "MarginalDistribution", "def": "从联合分布\"压回\"单个变量自身的分布:把另一个变量求和掉(离散)或积分掉(连续)。名字来自把行/列合计写在表格边缘。", "formula": "p_X(x)=\\sum_y p(x,y)\\qquad\\qquad f_X(x)=\\int f(x,y)\\,dy", "rels": ["联合分布", "随机变量独立性", "边缘密度-连续", "积分限与支撑", "边缘分布是否均匀"]}, {"id": "边缘分布是否均匀", "type": "c", "level": "advanced", "chapter": "l25", "en": "MarginalsOfJointUniform", "def": "联合均匀分布的边缘分布未必均匀:只有支撑 R 是矩形(边平行坐标轴)时,X、Y 的边缘才各自均匀且相互独立;三角形、圆盘等非矩形支撑上,边缘密度随位置变化,不再是均匀分布。", "formula": "f_X(x)=\\int f(x,y)\\,dy=\\frac{x\\ \\text{处竖直截线的长度}}{\\text{Area}(R)}", "rels": ["联合均匀分布", "边缘密度-连续", "连续型独立判据", "连续均匀分布"]}, {"id": "边缘密度-连续", "type": "c", "level": "basic", "chapter": "l26", "en": "MarginalProbabilityDensityFunction", "def": "已知联合密度 \\(f(x,y)\\),想单看其中一个变量的分布,就把另一个变量沿支撑积分掉,剩下的单变量密度叫边缘密度。几何直觉:把密度山沿要丢的方向压扁投影。", "formula": "f_X(x)=\\int_{-\\infty}^{\\infty} f(x,y)\\,dy,\\qquad f_Y(y)=\\int_{-\\infty}^{\\infty} f(x,y)\\,dx", "rels": ["边缘分布", "联合密度函数", "积分限与支撑", "连续型独立判据", "边缘分布是否均匀"]}, {"id": "边缘正态与线性组合", "type": "c", "level": "advanced", "chapter": "l31", "en": "NormalMarginalsAndLinearCombinations", "def": "二元正态的两条基本性质:边缘 \\(X\\sim N(\\mu_X,\\sigma_X^2)\\)、\\(Y\\sim N(\\mu_Y,\\sigma_Y^2)\\) 都是正态;且任意线性组合 \\(aX+bY\\) 仍正态(因它是 \\(Z_1,Z_2\\) 的线性组合)。", "formula": "aX+bY\\ \\sim\\ N\\big(a\\mu_X+b\\mu_Y,\\ \\ a^2\\sigma_X^2+b^2\\sigma_Y^2+2ab\\,\\rho\\,\\sigma_X\\sigma_Y\\big)", "rels": ["二元正态分布", "正态的线性组合", "和的方差", "边缘分布", "标准化"]}, {"id": "连续均匀分布", "type": "c", "level": "basic", "chapter": "l15", "en": "ContinuousUniformDistribution", "def": "区间 \\([a,b]\\) 上每点可能性均等的连续分布,记 \\(X\\sim U(a,b)\\):密度是高 \\(1/(b-a)\\) 的平顶直线,概率正比于区间长度。最简单的连续分布,保险免赔额/限额题的常客。", "formula": "f(x)=\\frac{1}{b-a}\\ (a\\le x\\le b),\\qquad F(x)=\\frac{x-a}{b-a},\\qquad \\Pr[c\\le X\\le d]=\\frac{d-c}{b-a}", "rels": ["概率密度函数", "均匀分布的矩", "均匀分布的分位数", "离散均匀分布", "Beta分布", "联合均匀分布"]}, {"id": "连续型条件方差", "type": "c", "level": "advanced", "chapter": "l30", "en": "ConditionalVarianceContinuous", "def": "给定 \\(Y=y\\) 下 \\(X\\) 的方差:照旧\"二阶原点矩减均值平方\"的捷径,只是所有期望都带上 \\(\\mid Y=y\\)。同样是 \\(y\\) 的函数。", "formula": "\\operatorname{Var}(X\\mid Y=y)=E[X^2\\mid Y=y]-\\big(E[X\\mid Y=y]\\big)^2", "rels": ["条件方差", "连续型条件矩", "连续型条件期望", "全方差公式"]}, {"id": "连续型条件期望", "type": "c", "level": "advanced", "chapter": "l30", "en": "ConditionalExpectationContinuous", "def": "一阶条件矩:给定 \\(Y=y\\) 后那支切片密度的重心。它是 \\(y\\) 的函数——不同条件值给出不同均值;把 \\(y\\) 换成随机的 \\(Y\\),它就是随机变量 \\(E[X\\mid Y]\\)。", "formula": "E[X\\mid Y=y]=\\int_{-\\infty}^{\\infty} x\\,f_{X\\mid Y}(x\\mid y)\\,dx", "rels": ["条件期望", "连续型条件矩", "条件期望是随机变量", "全期望公式", "条件分布(二元正态)"]}, {"id": "连续型条件概率", "type": "c", "level": "advanced", "chapter": "l29", "en": "ConditionalProbabilityContinuous", "def": "给定 \\(Y=y\\) 时 \\(X\\) 落入集合 \\(A\\) 的概率:先固定 \\(y\\) 得条件密度(一支合法密度),再照常对目标区间积分。", "formula": "P[X\\in A\\mid Y=y]=\\int_A f_{X\\mid Y}(x\\mid y)\\,dx", "rels": ["条件密度函数", "条件概率", "全概率公式-连续", "积分限与支撑"]}, {"id": "连续型条件矩", "type": "c", "level": "advanced", "chapter": "l30", "en": "ConditionalMomentsContinuous", "def": "给定 \\(Y=y\\) 下 \\(X\\) 的函数的期望:对条件密度做普通一维积分。口诀先切片、再归一、后积分——条件矩永远这三步,一步都不多。", "formula": "E\\!\\left[g(X)\\mid Y=y\\right]=\\int_{-\\infty}^{\\infty} g(x)\\,f_{X\\mid Y}(x\\mid y)\\,dx=\\frac{\\displaystyle\\int g(x)\\,f(x,y)\\,dx}{f_Y(y)}", "rels": ["条件矩", "条件密度函数", "LOTUS", "连续型条件期望", "连续型条件方差"]}, {"id": "连续型独立判据", "type": "c", "level": "advanced", "chapter": "l26", "en": "IndependenceOfContinuousRandomVariables", "def": "判断两个连续随机变量是否独立的充要条件:联合密度能因式分解为「只含 x 的因子 × 只含 y 的因子」,且支撑是矩形(可含 \\(\\pm\\infty\\))。两条缺一不可。", "formula": "X\\perp Y\\iff f(x,y)=g(x)\\,h(y)\\ \\text{且支撑为矩形}", "rels": ["随机变量独立性", "连续型独立性", "边缘密度-连续", "独立与乘积期望", "积分限与支撑"]}, {"id": "连续型独立性", "type": "c", "level": "advanced", "chapter": "l29", "en": "IndependenceContinuous", "def": "\"给定 \\(Y=y\\) 完全不改变 \\(X\\) 的分布\"即独立:条件密度与所给 \\(y\\) 无关、等于无条件边缘;等价于联合密度可拆成两个边缘之积。", "formula": "f_{X\\mid Y}(x\\mid y)=f_X(x)\\;\\Longleftrightarrow\\;f(x,y)=f_X(x)\\,f_Y(y)", "rels": ["随机变量独立性", "连续型独立判据", "条件密度函数", "边缘密度-连续", "独立与不相关"]}, {"id": "连续型联合矩", "type": "c", "level": "advanced", "chapter": "l27", "en": "ContinuousJointMoments", "def": "离散型联合矩的连续镜像:求两变量函数的期望,把双重求和换成二重积分、pmf 换成 pdf——对 \\(g(x,y)\\cdot f(x,y)\\) 在支撑上二重积分。\\(E[XY]\\)、\\(E[X^mY^n]\\) 是常用特例。", "formula": "E[g(X,Y)]=\\iint g(x,y)\\,f(x,y)\\,dx\\,dy", "rels": ["联合矩", "LOTUS", "期望的线性", "独立与乘积期望", "积分限与支撑", "协方差"]}, {"id": "连续性修正", "type": "c", "level": "advanced", "chapter": "l21", "en": "ContinuityCorrection", "def": "用连续的正态去近似整数值离散随机变量(二项、泊松、计数)时,把整数 \\(k\\) 摊到区间 \\([k-0.5,\\,k+0.5]\\) 再算——少了它答案会系统性偏差。", "formula": "P[X\\le k]\\approx\\Phi\\!\\left(\\frac{k+0.5-\\mu}{\\sigma}\\right),\\qquad P[X\\ge k]\\approx 1-\\Phi\\!\\left(\\frac{k-0.5-\\mu}{\\sigma}\\right)", "rels": ["正态分布", "中心极限定理", "和的正态近似", "二项分布", "泊松分布"]}, {"id": "阶乘矩", "type": "c", "level": "advanced", "chapter": "l33", "en": "FactorialMoment", "def": "第 n 阶阶乘矩是下降阶乘的期望 \\(\\mu_{(n)}=E[X(X{-}1)\\cdots(X{-}n{+}1)]\\),由概率母函数在 \\(t=1\\) 处求 n 次导生成。它是离散分布\"天生顺手\"的矩——求期望方差都经它中转。", "formula": "P'(1)=E[X],\\qquad P''(1)=E[X(X{-}1)],\\qquad P^{(n)}(1)=\\mu_{(n)}", "rels": ["概率母函数", "矩", "方差", "MGF取矩", "泊松分布的矩"]}, {"id": "随机变量", "type": "c", "level": "basic", "chapter": "l05", "en": "RandomVariable", "def": "从样本空间到实数集的一个函数——把随机试验的每个结果映射成一个实数(骰子点数、索赔个数、理赔金额)。大写 \\(X\\) 记变量,小写 \\(x\\) 记它的取值。", "formula": "X:\\Omega\\to\\mathbb{R}\\qquad p(x)=P[X=x],\\quad P[u<X\\le v]", "rels": ["概率函数", "概率密度函数", "累积分布函数", "混合型随机变量", "期望"]}, {"id": "随机变量独立性", "type": "c", "level": "advanced", "chapter": "l11", "en": "IndependenceOfRandomVariables", "def": "\\(X\\) 与 \\(Y\\) 独立 ⟺ 联合分布等于边缘分布的乘积、且对所有 \\((x,y)\\) 成立——\"知道 \\(X\\) 取什么,不改变 \\(Y\\) 的分布\"。实操判定两条缺一不可:密度可因式分解 且 支撑为矩形。", "formula": "X\\perp Y\\iff f(x,y)=f_X(x)\\,f_Y(y)\\ \\ \\forall(x,y)\\qquad\\quad f(x_1,\\dots,x_n)=\\prod_{i=1}^{n} f(x_i)", "rels": ["事件独立性", "联合分布", "边缘分布", "独立与乘积期望", "连续型独立判据", "独立与不相关"]}, {"id": "随机变量的条件分布", "type": "c", "level": "advanced", "chapter": "l06", "en": "ConditionalDistributionGivenEvent", "def": "把\"缩小样本空间再归一化\"从事件搬到随机变量的整条分布:给定事件 A(如 \\(X>a\\)),\"条件下的 X\"本身是一个新的随机变量,由条件 cdf \\(F_{X\\mid A}(x)=\\Pr(X\\le x\\mid A)\\) 刻画。", "formula": "\\Pr(X>a\\mid X<b)=\\frac{\\Pr(a<X<b)}{\\Pr(X<b)}\\qquad F_{X\\mid A}(x)=\\Pr(X\\le x\\mid A)", "rels": ["条件概率", "累积分布函数", "条件密度与条件pmf", "条件分布", "连续型条件概率"]}, {"id": "雅可比因子", "type": "c", "level": "basic", "chapter": "l34", "en": "JacobianFactor", "def": "单变量密度换元中乘的伸缩因子 \\(|dx/dy|=|h'(y)|\\)(反函数导数的绝对值)。概率是面积:变换把区间拉宽几倍,密度高度就得压低几倍——雅可比把\"格子大小变了\"补偿回来。", "formula": "\\left|\\frac{dx}{dy}\\right|=\\big|h'(y)\\big|,\\qquad h=g^{-1}", "rels": ["单调变换密度法", "非单调变换", "雅可比行列式", "概率密度函数"]}, {"id": "雅可比行列式", "type": "c", "level": "basic", "chapter": "l35", "en": "JacobianDeterminant", "def": "二维密度换元中乘的面积缩放因子:逆变换 \\(x=h_1(z,w),\\ y=h_2(z,w)\\) 的偏导矩阵行列式 J。面积微元满足 \\(dx\\,dy=|J|\\,dz\\,dw\\),密度乘 \\(|J|\\) 让每小块概率(密度 × 面积)在换元后保持不变。", "formula": "J=\\det\\!\\begin{pmatrix}\\dfrac{\\partial x}{\\partial z}&\\dfrac{\\partial x}{\\partial w}\\\\[6pt]\\dfrac{\\partial y}{\\partial z}&\\dfrac{\\partial y}{\\partial w}\\end{pmatrix}=\\frac{\\partial x}{\\partial z}\\frac{\\partial y}{\\partial w}-\\frac{\\partial x}{\\partial w}\\frac{\\partial y}{\\partial z}", "rels": ["多变量变换的雅可比法", "雅可比因子", "常见二元变换", "卷积公式", "联合密度函数"]}, {"id": "零相关即独立(正态特有)", "type": "c", "level": "advanced", "chapter": "l31", "en": "ZeroCorrelationImpliesIndependence", "def": "二元正态的招牌特权:\\(\\sigma_{XY}=0\\)(即 \\(\\rho=0\\))当且仅当 \\(X,Y\\) 独立。把平时不等价的\"不相关\"与\"独立\"捏成等价——仅在联合为二元正态时成立。", "formula": "\\sigma_{XY}=0\\ \\big(\\text{即 }\\rho=0\\big)\\quad\\Longleftrightarrow\\quad X,\\,Y\\ \\text{相互独立}\\qquad(\\text{仅限二元正态})", "rels": ["二元正态分布", "独立与不相关", "独立与不相关", "相关系数", "连续型独立性"]}, {"id": "非单调变换", "type": "c", "level": "hard", "chapter": "l34", "en": "ManyToOneTransformation", "def": "当 g 不是一一对应(many-to-one),多个 x 映到同一个 y——典型如 \\(Y=X^2\\) 且 X 的支撑跨过 0。此时对 g 的每个单调分支分别套密度法,再把各分支密度全部相加;漏一支错一半。", "formula": "f_Y(y)=\\sum_{i}f_X\\big(h_i(y)\\big)\\,\\big|h_i'(y)\\big|", "rels": ["单调变换密度法", "分布函数法", "雅可比因子", "积分限与支撑", "概率密度函数"]}, {"id": "二元正态条件期望直线公式", "type": "a", "level": "hard", "chapter": "l31", "en": "", "def": "题型:给 \\((X,Y)\\) 二元正态的五参数 \\((\\mu_X,\\mu_Y,\\sigma_X,\\sigma_Y,\\rho)\\),已知 \\(X=x\\),求 Y 的条件均值/方差/概率。", "formula": "", "rels": ["二元正态分布", "条件分布(二元正态)", "相关系数", "边缘正态与线性组合"]}, {"id": "免赔额与保单限额的期望计算", "type": "a", "level": "advanced", "chapter": "l07", "en": "", "def": "题型:损失 \\(X\\),保单带免赔额 \\(d\\)(赔 \\(\\max(X-d,0)\\))或限额 \\(u\\)(赔 \\(\\min(X,u)\\)),求期望赔付。", "formula": "", "rels": ["期望", "生存函数求期望", "免赔额与正赔付条件", "期望的线性", "指数分布"]}, {"id": "变换求分布的分布函数法实战", "type": "a", "level": "hard", "chapter": "l34", "en": "", "def": "题型:已知 X 的分布,求 \\(Y=g(X)\\)(或 max/m   var link = g.append('g').attr('stroke','#c3cbd9').attr('stroke-width',1.1).attr('stroke-opacity',.7)
    .selectAll('line').data(links).join('line');
  var node = g.append('g').selectAll('g').data(nodes).join('g').attr('class','nd').style('cursor','pointer');
  node.each(function(d){
    var el = d3.select(this);
    if(d.type === 'a'){
      el.append('rect').attr('x',-7.5).attr('y',-7.5).attr('width',15).attr('height',15)
        .attr('transform','rotate(45)').attr('rx',3)
        .attr('fill','#fff').attr('stroke',COLOR[d.level]||'#888').attr('stroke-width',2.4);
    } else {
      el.append('circle').attr('r',7).attr('fill',COLOR[d.level]||'#888')
        .attr('fill-opacity',.85).attr('stroke','#fff').attr('stroke-width',1.4);
    }
    el.append('text').text(d.id).attr('x',10).attr('y',4)
      .attr('font-size','10px').attr('fill','#3a4a63')
      .attr('paint-order','stroke').attr('stroke','#fff').attr('stroke-width',3);
  });

  var sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d){ return d.id; }).distance(52).strength(.35))
    .force('charge', d3.forceManyBody().strength(-130))
    .force('collide', d3.forceCollide(17))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('x', d3.forceX(W/2).strength(.03)).force('y', d3.forceY(H/2).strength(.03));
  sim.on('tick', function(){
    link.attr('x1',function(d){return d.source.x;}).attr('y1',function(d){return d.source.y;})
        .attr('x2',function(d){return d.target.x;}).attr('y2',function(d){return d.target.y;});
    node.attr('transform',function(d){ return 'translate('+d.x+','+d.y+')'; });
  });
  node.call(d3.drag()
    .on('start',function(ev,d){ if(!ev.active) sim.alphaTarget(.25).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',function(ev,d){ d.fx=ev.x; d.fy=ev.y; })
    .on('end',function(ev,d){ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  var LV = 'all', FOCUS = null;
  function passLv(d){ return LV === 'all' || d.level === LV; }
  function apply(){
    node.style('display', function(d){
      if(!passLv(d)) return 'none';
      if(FOCUS && !nbr[FOCUS][d.id]) return 'none';
      return null;
    });
    link.style('display', function(d){
      var s = d.source.id, t = d.target.id;
      if(!passLv(byId[s]) || !passLv(byId[t])) return 'none';
      if(FOCUS && s !== FOCUS && t !== FOCUS) return 'none';
      return null;
    });
    node.select('text').attr('font-size', FOCUS ? '12px' : '10px');
  }

  var modal = document.querySelector('.net-modal');
  function closeModal(){ modal.hidden = true; }
  function openModal(d){
    modal.querySelector('.net-t').textContent = (d.type==='a' ? '◇ ' : '') + d.id;
    var chip = modal.querySelector('.net-chip');
    chip.textContent = {basic:'基础',advanced:'进阶',hard:'高难'}[d.level] || d.level;
    chip.style.background = COLOR[d.level] || '#888';
    var go = modal.querySelector('.net-go');
    if(d.chapter && CHMAP[d.chapter]){
      go.style.display = '';
      go.setAttribute('href', CHMAP[d.chapter]);
      go.textContent = '进入 ' + d.chapter.toUpperCase() + ' ↗';
    } else { go.style.display = 'none'; }
    modal.querySelector('.net-en').textContent = d.en || (d.type==='a' ? '应用卡 · Application' : '');
    modal.querySelector('.net-def').textContent = d.def || '';
    var f = modal.querySelector('.net-f');
    if(d.formula){ f.style.display=''; f.innerHTML = '$$' + d.formula + '$$'; } else { f.style.display='none'; f.innerHTML=''; }
    var rel = modal.querySelector('.net-rel'); rel.innerHTML = '';
    if(d.rels && d.rels.length){
      var lab = document.createElement('span'); lab.textContent = (d.type==='a'?'based_on:':'相连:') + ' ';
      rel.appendChild(lab);
      d.rels.forEach(function(r){
        if(!byId[r]) return;
        var a = document.createElement('a'); a.textContent = r;
        a.addEventListener('click', function(){ focusOn(byId[r]); });
        rel.appendChild(a);
      });
    }
    modal.hidden = false;
    if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([modal]);
  }
  function focusOn(d){
    if(FOCUS === d.id){ FOCUS = null; closeModal(); }
    else { FOCUS = d.id; openModal(d); }
    apply();
  }
  node.on('click', function(ev, d){ ev.stopPropagation(); focusOn(d); });
  svg.on('click', function(){ if(FOCUS){ FOCUS = null; closeModal(); apply(); } });
  modal.querySelector('.net-x').addEventListener('click', closeModal);
  modal.querySelector('.net-back').addEventListener('click', closeModal);
  modal.querySelector('.net-go').addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape'){ closeModal(); } });

  var fsb = host.querySelector('.fsbtn'), stage = host.querySelector('.stage');
  if(fsb) fsb.addEventListener('click', function(){
    if(document.fullscreenElement){ document.exitFullscreen(); }
    else if(stage.requestFullscreen){ stage.requestFullscreen(); }
  });
  document.addEventListener('fullscreenchange', function(){
    var fs = !!document.fullscreenElement;
    if(fsb) fsb.textContent = fs ? '✕ 退出全屏' : '⛶ 全屏';
    var w = svg.node().clientWidth || W, h = svg.node().clientHeight || H;
    sim.force('center', d3.forceCenter(w/2, h/2));
    sim.force('x', d3.forceX(w/2).strength(.03));
    sim.force('y', d3.forceY(h/2).strength(.03));
    sim.alpha(.3).restart();
  });

  Array.prototype.forEach.call(host.querySelectorAll('.fbtn'), function(b){
    if(b.classList.contains('fsbtn')) return;
    b.addEventListener('click', function(){
      Array.prototype.forEach.call(host.querySelectorAll('.fbtn'), function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      LV = b.getAttribute('data-lv');
      FOCUS = null; closeModal(); apply();
    });
  });
})();
</script>
