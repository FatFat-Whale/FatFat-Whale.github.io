<script type="application/json" class="net-data">{"nodes": [{"id": "久期", "type": "c", "level": "basic", "chapter": "fm-l08", "status": "wip", "en": "MacaulayDuration", "rels": ["利息力", "凸性", "免疫策略", "债券定价", "等时法"], "html": "<h4>定义</h4><p>现金流的 <strong>PV 加权平均时间</strong>(PV 重心时刻),度量现值对利率的敏感度:\\(D_{mac}=\\frac{\\sum t\\,v^tA_t}{\\sum v^tA_t}\\),数学上等价于 PV 对利息力 δ 的敏感度。修正久期 \\(D_{mod}=vD_{mac}\\) 对 i 求导。<strong>考试无修饰词的 \"duration\" = Macaulay</strong>(SOA 规定)。</p><p><strong>白话</strong>:把每笔钱的 PV 当砝码摆上时间轴,天平支点的位置就是久期;零息债的久期就是它的剩余年数。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$D_{mac}=\\frac{\\sum t\\,v^t A_t}{P(i)}=-\\frac{dP/d\\delta}{P}\\qquad D_{mod}=-\\frac{P'(i)}{P(i)}=\\frac{D_{mac}}{1+i}$$</div><p>五种标准资产:零息债 = n;永续 immediate = \\(\\frac{1+i}{i}\\);<strong>平价附息债 = \\(\\ddot a_{\\overline{n}|}\\)</strong>;增长股 = \\(\\frac{1+i}{i-g}\\);level 按揭 = \\(\\frac{(Ia)_{\\overline{n}|}}{a_{\\overline{n}|}}\\)。</p><ul><li>券息越高、重心越靠前、久期越短;组合久期 = 成分久期的<strong>价格加权平均</strong>。</li><li>两个一阶近似:修正版 \\(P\\approx P_0[1-\\Delta i\\,D_{mod}]\\)(恒低估);<strong>Macaulay 版更准</strong>:\\(P\\approx P_0(\\frac{1+i_0}{1+i})^{D_{mac}}\\)。</li><li>随时间锯齿下降:渐降、每逢付息日跳升一齿。</li><li>平价债陷阱:D_mac=ä(due)、D_mod=a(immediate),一撇之差。</li></ul><p><strong>算一遍</strong>:同一时点 D_mac=10、D_mod=9.39,求 i。</p><ul><li>\\(D_{mod}=\\frac{D_{mac}}{1+i}\\Rightarrow 9.39=\\frac{10}{1+i}\\)。</li><li>\\(1+i=1.0650\\)。</li><li>i=6.50% ✓(ASM Ex 8.8)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"利息力\">利息力</a> — D_mac 是 PV 对 δ 的敏感度</li><li><a class=\"net-wl\" data-id=\"凸性\">凸性</a> — 二阶补丁</li><li><a class=\"net-wl\" data-id=\"免疫策略\">免疫策略</a> — 三条件的第二条</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 价格敏感度的载体</li><li><a class=\"net-wl\" data-id=\"等时法\">等时法</a> — 金额加权版的前身(不折现)</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"资产负债免疫的三层防护\">资产负债免疫的三层防护</a></li></ul>"}, {"id": "价值方程", "type": "c", "level": "basic", "chapter": "fm-l02", "status": "wip", "en": "EquationOfValue", "rels": ["现值与折现因子", "等时法", "年金基本符号", "贷款尾款与再融资"], "html": "<h4>定义</h4><p>把所有款项折算到同一个<strong>比较日(comparison date)</strong>,令流入 = 流出,就是价值方程。等价原则打底:今天 <span>$</span>1,000 与一年后 <span>$</span>1,050(5% 下)无差异。配套工具是<strong>时间图</strong>:\"把题目画成一幅画,画完题差不多自己解完了\"。</p><p><strong>白话</strong>:比较日是数钱的桌子——桌子随便挑(122 年后那张都行),但所有钱必须搬到<strong>同一张</strong>桌子上再比。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\sum \\text{流入}_k\\,(1+i)^{\\pm s_k}=\\sum \\text{流出}_k\\,(1+i)^{\\pm s_k}$$</div><ul><li>比较日任选,解不变(两边同乘除 (1+i) 的幂即切换)。</li><li>时间图规范四条:存取两侧、期单位标左端、利率小箭头、竖箭指比较日。</li><li>付款期 ≠ 计息期:先解等效利率 \\((1+j)^m=(1+i)^k\\),默认按付款期作图。</li></ul><p><strong>算一遍</strong>:两年后凑 <span>$</span>5,000,今天存 X、一年后再存 X,6% 有效。</p><ul><li>取时间 2 为比较日:\\(X(1.06^2+1.06)=5{,}000\\)。</li><li>\\(X=5{,}000/2.1836=\\$2{,}289.80\\) ✓(ASM p.73)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"现值与折现因子\">现值与折现因子</a> — 搬钱的工具</li><li><a class=\"net-wl\" data-id=\"等时法\">等时法</a> — 多笔并一笔的近似解</li><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 规则付款串的价值方程速记</li><li><a class=\"net-wl\" data-id=\"贷款尾款与再融资\">贷款尾款与再融资</a> — 再融资通法就是一条价值方程</li></ul>"}, {"id": "债券定价", "type": "c", "level": "basic", "chapter": "fm-l07", "status": "wip", "en": "BondValuation", "rels": ["年金基本符号", "债券溢价与折价", "可赎回债券", "净现值与内部收益率", "即期利率", "久期"], "html": "<h4>定义</h4><p>债券 = 借钱给政府/公司,定期收息票(coupon)、到期收赎回值 C。六参数:面值 F(唯一作用:×r 定 coupon)、赎回值 C(默认 =F)、息票率 r(固定属性)、修正息票率 g=Fr/C、期数 n、收益率 i(买价决定)。价格 = 两笔钱折现相加。</p><p><strong>白话</strong>:债券是\"反向贷款\"——你是放贷的,coupon 是别人还你的月供,到期还一笔大的。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$P=Fr\\,a_{\\overline{n}|i}+Cv_i^n\\qquad P=C+(Fr-Ci)\\,a_{\\overline{n}|i}$$</div><ul><li>\"8% semiannual coupons\" = 年总额 8%、每半年付 4%×F。</li><li>溢价/折价式利息项<strong>永远是 Ci 不是 Fi</strong>(C≠F 时的头号坑)。</li><li>反求 yield:TVM CPT I/Y(PV 与 PMT/FV 反号);出的是每 coupon 期率,按题意 ×2 或平方。</li><li>近似 sanity check(推销员法):\\(i\\approx\\frac{nCg+C-P}{\\frac n2(P+C)}\\)。</li></ul><p><strong>算一遍</strong>:<span>$</span>1,000 债券、8% semiannual、10 年、按面赎回,按名义 6% 半年计息定价。</p><ul><li>每期 coupon 40、i=3%、n=20。</li><li>TVM:20 N、3 I/Y、40 PMT、1000 FV、CPT PV。</li><li>P = <span>$</span>1,148.77 ✓(Fr=40 大于 Ci=30 ⇒ 溢价,P 大于 C 自洽)(ASM p.333)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 息票年金 + 单笔折现</li><li><a class=\"net-wl\" data-id=\"债券溢价与折价\">债券溢价与折价</a> — P 与 C 的差及其摊销</li><li><a class=\"net-wl\" data-id=\"可赎回债券\">可赎回债券</a> — 加提前赎回权后的定价</li><li><a class=\"net-wl\" data-id=\"净现值与内部收益率\">净现值与内部收益率</a> — YTM 即 IRR</li><li><a class=\"net-wl\" data-id=\"即期利率\">即期利率</a> — 逐笔按 spot 折现的定价视角</li><li><a class=\"net-wl\" data-id=\"久期\">久期</a> — 价格对利率的敏感度</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — TVM 债券流程</li><li><a class=\"net-wl\" data-id=\"资产负债免疫的三层防护\">资产负债免疫的三层防护</a> — 久期匹配 / 凸性压制 / 现金流匹配三层</li></ul>"}, {"id": "债券溢价与折价", "type": "c", "level": "advanced", "chapter": "fm-l07", "status": "wip", "en": "BondPremiumAndDiscount", "rels": ["债券定价", "贷款摊还", "可赎回债券"], "html": "<h4>定义</h4><p>买价 P 与赎回值 C 的差:P&amp;gt;C 溢价(g&amp;gt;i)、P&amp;lt;C 折价(g&amp;lt;i)。账面价值 B_t 沿摊销表从 P 走到 C——就是<a class=\"net-wl\" data-id=\"贷款摊还\">贷款摊还</a>那台机器换四个名字:book value↔余额、coupon↔还款、write down↔还本、write up↔折价累积。</p><p><strong>白话</strong>:溢价债像多付了入场费——每期 coupon 里有一小块是退你多付的本,退完刚好剩 C;折价债反向,书值逐期\"长胖\"到 C。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\text{Premium}=P-C=(Cg-Ci)a_{\\overline{n}|}\\qquad I_t=iB_{t-1}\\qquad P_t=(Cg-Ci)v^{\\,n-t+1}\\qquad B_t=B_{t-1}\\mp P_t$$</div><ul><li>P_t 逐期<strong>等比,公比 (1+i)</strong>;全部 P_t 之和 = |P−C|。</li><li>折价时 P_t 为负、书值上升(write up)——财界规避负数的叫法。</li><li>机构报表 investment income = coupon ± 摊销调整,不是 coupon 本身。</li></ul><p><strong>算一遍</strong>:<span>$</span>100 债券、5% semiannual、10 年、<span>$</span>105 赎回、收益 4% 名义半年。第 9 个 coupon 的溢价摊销?</p><ul><li>\\(Fr=2.50\\),\\(Ci=105\\times.02=2.10\\)。</li><li>\\(P_9=(2.50-2.10)v^{20-9+1}=0.4v^{12}\\) at 2%。</li><li>= <span>$</span>0.32 ✓(ASM Ex 7.6)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 溢价/折价公式的出处</li><li><a class=\"net-wl\" data-id=\"贷款摊还\">贷款摊还</a> — 同一台机器</li><li><a class=\"net-wl\" data-id=\"可赎回债券\">可赎回债券</a> — 溢价/折价决定最坏赎回日方向</li></ul>"}, {"id": "免疫策略", "type": "c", "level": "hard", "chapter": "fm-l08", "status": "wip", "en": "Immunization", "rels": ["久期", "凸性", "债券定价", "可赎回债券"], "html": "<h4>定义</h4><p>保护金融机构免受利率变动冲击的资产负债配平术,三层:<strong>Redington</strong>(防小幅)、<strong>full immunization</strong>(防任意幅度)、<strong>dedication</strong>(逐期精确匹配,利率随便动)。背景:负债晚于资产 → 再投资怕降息;资产晚于负债 → 中途变现怕加息。</p><p><strong>白话</strong>:搭跷跷板——PV 等 = 两边一样重;久期等 = 支点对齐;资产凸性更大 = 资产那边翘得更弯,小幅怎么晃都压得住。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\text{Redington: } P_A=P_L\\qquad P'_A=P'_L\\ (D^A=D^L)\\qquad P''_A\\gt P''_L\\ (C^A\\gt C^L)$$</div><ul><li>等价:盈余 \\(P=P_A-P_L\\) 在 i₀ 处取<strong>相对极小</strong>(P=0、P′=0、P″&amp;gt;0);第三条件 ⇔ \\(\\sum t^2v^tA_t\\gt\\sum t^2v^tL_t\\)。</li><li><strong>跨骑才有大凸性</strong>:资产现金流分布在负债两侧 ⇒ 三条件可成;夹在中间必挂。</li><li>Full:PV 等 + 久期等 + <strong>负债前后各一笔资产</strong> ⇒ 防任意幅度。</li><li>Dedication:\\(A_t=L_t\\) 逐期对账,<strong>从最远期负债倒推</strong>逐只债面值;说易行难(call/提前还款/负债是估计)。</li><li>非一劳永逸:时间流逝改变久期(锯齿),需 rebalance。</li></ul><p><strong>算一遍</strong>:负债 2 年后 <span>$</span>1,000;资产用 1 年、4 年零息债(X、Y),i=7.5%,full immunization。</p><ul><li>条件一:\\(vX+v^4Y=1{,}000v^2\\);条件二:\\(\\frac{vX+4v^4Y}{1{,}000v^2}\\cdot\\frac{?}{}\\) → 加权时间 =2。</li><li>解出 \\(Y=\\frac{1{,}000}{3}(1.075)^2=385.21\\),\\(X=620.16\\)。</li><li>极端核对:i→0 时资产 1,005.37 &amp;gt; 1,000;i=100% 时 334.16 &amp;gt; 250——两端都盈余 ✓(ASM Ex 8.22)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"久期\">久期</a> — 第二条件</li><li><a class=\"net-wl\" data-id=\"凸性\">凸性</a> — 第三条件</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 配平工具箱</li><li><a class=\"net-wl\" data-id=\"可赎回债券\">可赎回债券</a> — dedication 难产的原因之一</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"资产负债免疫的三层防护\">资产负债免疫的三层防护</a></li></ul>"}, {"id": "再投资利率", "type": "c", "level": "advanced", "chapter": "fm-l05", "status": "wip", "en": "ReinvestmentRate", "rels": ["等差年金", "年金基本符号", "债券定价", "净现值与内部收益率"], "html": "<h4>定义</h4><p>原投资按利率 i 付息,利息取出后只能按市价 i′ 再投——总财富 = 本金(原地不动)+ 利息流在第二账户滚出的年金。债券息票的现实困境:到期收益率默认息票同率再投,这个概念给该假设打补丁。</p><p><strong>白话</strong>:本金在 A 厂打工,工资(利息)只能存到 B 银行。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$AV_{\\text{单笔 }1}=1+i\\,s_{\\overline{n}|i'}\\qquad AV_{\\text{每年初存 }1\\text{ 共 }n\\text{ 年}}=n+i\\,(Is)_{\\overline{n}|i'}$$</div><ul><li>利息被\"剥离\"(stripped out)后原账户<strong>不复利</strong>——别把 \\(100(1.10)^{10}\\) 当答案。</li><li>(Is) 的下标利率是<strong>再投资利率 i′</strong>,不是原利率 i。</li><li>利率分段用 block payments 拆利息流。</li></ul><p><strong>算一遍</strong>:<span>$</span>1,000 存利率 i 账户,利息每年取出再投 5%;10 年末合计 <span>$</span>1,780,求 i。</p><ul><li>\\(1{,}780=1{,}000+1{,}000\\,i\\,s_{\\overline{10}|.05}\\)。</li><li>\\(s_{\\overline{10}|.05}=12.5779\\)。</li><li>\\(i=780/12{,}577.9=6.20\\%\\) ✓(ASM Ex 5.6)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"等差年金\">等差年金</a> — 年初连存的利息流是 (Is) 形</li><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — s 的主场</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — YTM 的再投资假设</li><li><a class=\"net-wl\" data-id=\"净现值与内部收益率\">净现值与内部收益率</a> — 整笔交易收益率的合计视角</li></ul>"}, {"id": "净现值与内部收益率", "type": "c", "level": "basic", "chapter": "fm-l05", "status": "wip", "en": "NetPresentValueAndIRR", "rels": ["现值与折现因子", "价值方程", "债券定价", "即期利率"], "html": "<h4>定义</h4><p>NPV = 流入 PV − 流出 PV,折现率用<strong>资本成本</strong>(同风险替代投资的市场利率);选最大、负则拒。IRR = 使 \\(P(i)=\\sum v^t(A_t-L_t)=0\\) 的 i(即 yield rate);比较时选最高。</p><p><strong>白话</strong>:NPV 拿外部的尺量\"比放银行多赚多少\";IRR 问\"这笔生意自己内生年化多少\"。外尺唯一,内尺可能量出两个读数。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$NPV=\\sum(A_t-L_t)v^t\\qquad \\text{IRR: } P(i)=0$$</div><ul><li><strong>IRR 多解陷阱</strong>:P(i)=0 是多项式,根可多个/负/虚。唯一正解充分条件:先净流出后净流入(或反之);更一般:全程投资余额为正。</li><li>教材仿莎翁:\"be not both a borrower and lender at the same time or confusion will reign.\"</li><li>计算器 CF 工作表:CF₀ + C01–C24(带频数 F),NPV 键入利率 CPT;IRR 直接 CPT——多解时<strong>只报一个根</strong>。</li></ul><p><strong>算一遍</strong>:投 10,000@0、收 40,000@1、付 20,000@2,求 IRR。</p><ul><li>\\(-10{,}000+40{,}000v-20{,}000v^2=0\\Rightarrow 2v^2-4v+1=0\\)。</li><li>双根:i=−41.42% 或 +241.42%(同期又借又贷所致)。</li><li>计算器只报 −41.42% ✓(ASM p.246/248)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"现值与折现因子\">现值与折现因子</a> — NPV 的底层动作</li><li><a class=\"net-wl\" data-id=\"价值方程\">价值方程</a> — IRR 方程就是价值方程</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — YTM 是债券语境的 IRR</li><li><a class=\"net-wl\" data-id=\"即期利率\">即期利率</a> — yield 是 spot 的\"非算术平均\"</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — CF/NPV/IRR 工作表全流程</li></ul>"}, {"id": "凸性", "type": "c", "level": "advanced", "chapter": "fm-l08", "status": "wip", "en": "Convexity", "rels": ["久期", "免疫策略", "债券定价"], "html": "<h4>定义</h4><p>价格/收益率曲线的<strong>弯度</strong>(二阶导度量):切线(久期一阶近似)估价永远偏低,差的那截就是凸性。<strong>考试无修饰词的 \"convexity\" = modified</strong>——与 duration 的默认(Macaulay)方向相反,最易混。</p><p><strong>白话</strong>:久期是切线斜率,凸性是曲线\"翘起来\"的程度;曲线上翘 ⇒ 切线估价永远偏低,凸性就是补这个弯的。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$C_{mod}=\\frac{P''(i)}{P(i)}=\\frac{\\sum t(t+1)v^{t+2}A_t}{P(i)}\\qquad C_{mac}=\\frac{\\sum t^2v^tA_t}{P(i)}\\qquad C_{mod}=\\frac{C_{mac}+D_{mac}}{(1+i)^2}$$</div><ul><li>C_mod 分子是 \\(t(t+1)v^{t+2}\\);\\(t^2v^t\\) 属于 C_mac,别串。</li><li>关系式分子要<strong>加 D_mac</strong> 再除 \\((1+i)^2\\)。</li><li>考纲只要求会算(不考二阶近似公式);少量现金流的手算必会。</li></ul><p><strong>算一遍</strong>:资产 2 年后 <span>$</span>10,000、10 年后 <span>$</span>25,000,i=6%,求 C_mod。</p><ul><li>\\(P=10{,}000v^2+25{,}000v^{10}=22{,}859.83\\)。</li><li>分子:\\((2)(3)v^4(10{,}000)+(10)(11)v^{12}(25{,}000)\\)。</li><li>\\(C_{mod}=61.86\\) ✓(关系式核对:\\((62.62+6.89)/1.06^2=61.86\\))(ASM Ex 8.14/8.17)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"久期\">久期</a> — 一阶与二阶</li><li><a class=\"net-wl\" data-id=\"免疫策略\">免疫策略</a> — 第三条件:资产凸性更大</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 曲线的载体</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"资产负债免疫的三层防护\">资产负债免疫的三层防护</a></li></ul>"}, {"id": "利息力", "type": "c", "level": "hard", "chapter": "fm-l01", "status": "wip", "en": "ForceOfInterest", "rels": ["积累函数", "实际利率", "名义利率", "连续年金", "错拍年金", "久期"], "html": "<h4>定义</h4><p>时刻 t 的<strong>瞬时增长率</strong>:\\(\\delta_t=\\frac{a'(t)}{a(t)}\\)。导数 a′ 是\"赚钱速度\",除以当时金额才是\"增长率\"——银行 A 存 <span>$</span>100 年赚 <span>$</span>5、银行 B 存 <span>$</span>200 也赚 <span>$</span>5,率差一倍。恒定时 δ 就是连续复利:名义利率复利频率 → ∞ 的极限。</p><p><strong>白话</strong>:仪表盘上的瞬时时速;i 是按出发点报的年均速,δ 是每一刻的表读数。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\delta_t=\\frac{a'(t)}{a(t)}=\\frac{d}{dt}\\ln a(t)\\qquad a(t)=e^{\\int_0^t\\delta_r\\,dr}\\qquad e^\\delta=1+i,\\ \\ \\delta=\\ln(1+i)$$</div><ul><li><strong>先积分,后取 e</strong>(ASM p.38 Trap):e 的指数是含上下限代完的整个定积分。</li><li><strong>变力不从 0 起投</strong>(1g 陷阱):\\(AV=\\frac{a(t_2)}{a(t_1)}=e^{\\int_{t_1}^{t_2}\\delta_t dt}\\),积分限 t₁→t₂,不是 0→持有年数。</li><li>考试语境 \"simple interest\" 例外:从每笔存入日重启 1+it,不套 a(t₂)/a(t₁)。</li><li>log 技巧:a(t) 形状狰狞时先取 ln 再微分(Ex 1.25)。</li><li>幂级数:\\(\\delta=i-\\frac{i^2}{2}+\\frac{i^3}{3}-\\cdots=d+\\frac{d^2}{2}+\\frac{d^3}{3}+\\cdots\\)。</li></ul><p><strong>算一遍</strong>:δ_t=.02t(t=0 起算),<span>$</span>1 于 t=2 投入、t=7 取出。</p><ul><li>诱错:持有 5 年 ⇒ e^{.25}(✗,钱 t=2 才进场)。</li><li>正确:\\(AV=a(7)/a(2)=e^{.49}/e^{.04}=e^{.45}\\) ✓(ASM Ex 1.34)</li><li>直觉:δ 递增,t=2→7 这段比 0→5 长得快。</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"积累函数\">积累函数</a> — δ 与 a 互相还原</li><li><a class=\"net-wl\" data-id=\"实际利率\">实际利率</a> — δ=ln(1+i)</li><li><a class=\"net-wl\" data-id=\"名义利率\">名义利率</a> — i^(∞)=d^(∞)=δ</li><li>连续年金(<a class=\"net-wl\" data-id=\"错拍年金\">错拍年金</a> m→∞ 节)— 分母 δ 的来源</li><li><a class=\"net-wl\" data-id=\"久期\">久期</a> — D_mac 就是 PV 对 δ 的敏感度</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"利率五种读数的换算体系\">利率五种读数的换算体系</a></li></ul>"}, {"id": "即期利率", "type": "c", "level": "basic", "chapter": "fm-l09", "status": "wip", "en": "SpotRate", "rels": ["收益率曲线", "远期利率", "债券定价", "净现值与内部收益率"], "html": "<h4>定义</h4><p>期限 t 的单笔投资从头到尾的年实际利率 r_t,等价于 <strong>t 年期零息债的定价利率</strong>。整段一口价:r₂ 管 0→2 全程,不是\"第 2 年当年\"的利率。</p><p><strong>白话</strong>:银行定期存单价目表——存多久、给多少年化,一段一价。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$AV=(1+r_t)^t\\qquad P=\\sum_t\\frac{CF_t}{(1+r_t)^t}\\qquad r_t=P_t^{-1/t}-1\\ (\\text{零息债价格互推})$$</div><ul><li>每笔现金流用<strong>自己期限</strong>的 spot 折;非整数期限 t 直接上指数。</li><li>yield(YTM)= 再现价格的单一利率,<strong>不是 spot 的算术平均</strong>。</li><li><strong>bootstrap 剥洋葱</strong>:1 年票息债单笔支付给出 r₁;2 年债用 r₁ 剥掉第一年,暴露 r₂;层层向外。</li></ul><p><strong>算一遍</strong>:三年每年末收 <span>$</span>1,000,spot 曲线 5.00%/5.35%/5.65%。</p><ul><li>\\(P=1{,}000[1.05^{-1}+1.0535^{-2}+1.0565^{-3}]\\)。</li><li>\\(=952.38+901.19+847.82=\\$2{,}701.39\\) ✓(ASM Ex 9.1)</li><li>对应 yield:解 \\(1{,}000a_{\\overline{3}|j}=2{,}701.39\\) 得 j=5.4313%(介于各 spot 间,非平均)。</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"收益率曲线\">收益率曲线</a> — spot 的图形载体</li><li><a class=\"net-wl\" data-id=\"远期利率\">远期利率</a> — 两条路一个终点互推</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 逐笔按 spot 折现的定价视角</li><li><a class=\"net-wl\" data-id=\"净现值与内部收益率\">净现值与内部收益率</a> — yield 与 spot 的关系</li></ul>"}, {"id": "可赎回债券", "type": "c", "level": "advanced", "chapter": "fm-l07", "status": "wip", "en": "CallableBond", "rels": ["债券定价", "债券溢价与折价", "免疫策略"], "html": "<h4>定义</h4><p>发行人有权在到期前按 call price 提前赎回的债券(利率跌了赎旧发新,类比房贷 refinance)。投资人不知何时被 call ⇒ 定价按<strong>对你最不利的赎回日</strong>出价,保证实际 yield ≥ 目标。</p><p><strong>白话</strong>:买 callable 债 = 你送发行人一张\"提前还款牌\";按他最坑你的出牌方式定价,实际只会更好不会更差。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\text{PEW: } g\\gt i\\ (\\text{溢价})\\Rightarrow \\text{最早 call 日}\\qquad g\\lt i\\ (\\text{折价})\\Rightarrow \\text{最晚}$$</div><div class=\"net-mth\">$$\\text{call 价分段/带 call premium: 每个候选日各算一价,取 } \\min$$</div><ul><li>直觉:溢价靠后续高 coupon 回本,早被 call 回不完;折价的捡漏收益要等赎回落袋,越晚年化越差。</li><li>段内 g 用<strong>段内赎回值</strong>算(同一债券不同段 g 不同)。</li><li>给出最低价的赎回日不一定是全局最早 call 日。</li></ul><p><strong>算一遍</strong>:<span>$</span>100、6% annual、20 年到期、10 年后可按面 call,目标 4%。</p><ul><li>\\(g=.06\\gt i=.04\\) ⇒ 溢价 ⇒ 用最早 n=10。</li><li>\\(P=100+(6-4)a_{\\overline{10}|.04}=100+2\\times 8.1109\\)。</li><li>= <span>$</span>116.22 ✓(若 20 年才赎,yield 升到 4.73%——只会更好)(ASM Ex 7.11)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 基础定价加一层最坏假设</li><li><a class=\"net-wl\" data-id=\"债券溢价与折价\">债券溢价与折价</a> — PEW 的判据来源</li><li><a class=\"net-wl\" data-id=\"免疫策略\">免疫策略</a> — 现金流不可预测性的来源之一(dedication 难点)</li></ul>"}, {"id": "名义利率", "type": "c", "level": "advanced", "chapter": "fm-l01", "status": "wip", "en": "NominalRateOfInterest", "rels": ["实际利率", "实际贴现率", "利息力", "错拍年金"], "html": "<h4>定义</h4><p>\"6% 名义、按月复利(convertible monthly)\"= 每月实际利率 0.5%,一年滚成 \\(1.005^{12}-1=6.17\\%\\)。上标 (m) 不是指数,是\"每年复利 m 次\";<strong>名义利率 ÷ m = 每期实际利率</strong>。名义贴现率 d^(m) 同理。</p><p><strong>白话</strong>:nominal = in name only——挂名 CEO 不管事;真实的是除以 m 之后那个每期率。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\Bigl(1+\\frac{i^{(m)}}{m}\\Bigr)^m=1+i\\qquad \\Bigl(1-\\frac{d^{(m)}}{m}\\Bigr)^m=1-d\\qquad i^{(p)}=p\\Bigl[\\Bigl(1+\\frac{i^{(m)}}{m}\\Bigr)^{m/p}-1\\Bigr]$$</div><ul><li>期长由名义率的描述直接决定,m 可为 1/2 等非整数(\"6% 每两年复利一次\" ⇒ 期利率 12%)。</li><li>名义率低但复利更频者可赢:12% 月复利(1.126825)胜 12.2% 半年复利(1.125721)。</li><li>BA II Plus:ICONV 工作表(NOM/EFF/C/Y)互算;贴现率不支持,用常规键。</li></ul><p><strong>算一遍</strong>:与实际年率 6.23% 等价的月复利名义利率。</p><ul><li>\\(i^{(12)}=12(1.0623^{1/12}-1)\\)。</li><li>\\(=12\\times 0.005049=6.06\\%\\)。</li><li>ICONV 核对:EFF=6.23, C/Y=12, CPT NOM → 6.0589 ✓</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"实际利率\">实际利率</a> — 除以 m 前后的关系</li><li><a class=\"net-wl\" data-id=\"实际贴现率\">实际贴现率</a> — d^(m) 对应</li><li><a class=\"net-wl\" data-id=\"利息力\">利息力</a> — m→∞ 的极限 i^(∞)=δ</li><li><a class=\"net-wl\" data-id=\"错拍年金\">错拍年金</a> — a^(m) 符号的分母来源</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"利率五种读数的换算体系\">利率五种读数的换算体系</a></li><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — ICONV 流程</li></ul>"}, {"id": "实际利率", "type": "c", "level": "basic", "chapter": "fm-l01", "status": "wip", "en": "EffectiveRateOfInterest", "rels": ["积累函数", "实际贴现率", "名义利率", "利息力"], "html": "<h4>定义</h4><p>第 t 年的增长率,<strong>以年初金额为基</strong>:\\(i_t=\\frac{a(t)-a(t-1)}{a(t-1)}\\)。复利下各年恒为常数 i,\\(a(t)=(1+i)^t\\)。</p><p><strong>白话</strong>:今年赚的利息除以年初的本金——\"按出发点报的年均速\"。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$i_t=\\frac{a(t)-a(t-1)}{a(t-1)}=\\frac{A(t)-A(t-1)}{A(t-1)}\\qquad A(t)=(1+i_t)A(t-1)$$</div><ul><li>与 <a class=\"net-wl\" data-id=\"实际贴现率\">实际贴现率</a> 的分母之差:i 除年初,d 除年末 ⇒ 恒有 \\(d\\lt i\\)。</li><li>与其余读数一条等式互换:\\((1+i)=(1+\\frac{i^{(m)}}{m})^m=(1-\\frac{d^{(m)}}{m})^{-m}=e^\\delta\\)。</li></ul><p><strong>算一遍</strong>:i_t = k+.01(t−1),<span>$</span>100 两年滚到 <span>$</span>112.35,求 i₂。</p><ul><li>链乘:\\((1+k)(1+k+.01)=1.1235\\)。</li><li>解二次:k=.0550。</li><li>故 \\(i_2=k+.01=6.50\\%\\) ✓(ASM Ex 1.8)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"积累函数\">积累函数</a> — i 是它的年度读数</li><li><a class=\"net-wl\" data-id=\"实际贴现率\">实际贴现率</a> — 同一笔利息换年末做分母</li><li><a class=\"net-wl\" data-id=\"名义利率\">名义利率</a> — i^(m)/m 才是每期实际利率</li><li><a class=\"net-wl\" data-id=\"利息力\">利息力</a> — δ=ln(1+i),连续复利极限</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"利率五种读数的换算体系\">利率五种读数的换算体系</a></li></ul>"}, {"id": "实际贴现率", "type": "c", "level": "advanced", "chapter": "fm-l01", "status": "wip", "en": "EffectiveRateOfDiscount", "rels": ["实际利率", "现值与折现因子", "名义利率", "年金基本符号"], "html": "<h4>定义</h4><p>第 t 年的增长率,<strong>以年末金额为基</strong>:\\(d_t=\\frac{a(t)-a(t-1)}{a(t)}\\)。情境原型:一年后付 <span>$</span>1,000 的票据按 10% 贴现,利息 <span>$</span>100 从面值<strong>预先</strong>扣,今天只付 <span>$</span>900。</p><p><strong>白话</strong>:同一笔利息,换\"到达点\"做分母——利息预扣的世界用 d 说话。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$1-d=v\\qquad d=\\frac{i}{1+i}=iv\\qquad i=\\frac{d}{1-d}\\qquad i-d=id\\qquad \\frac1d-\\frac1i=1$$</div><ul><li><strong>指数方向与 i 相反</strong>(ASM p.22 Trap Alert):贴现 \\((1-d)^t\\) 正指数,积累 \\((1-d)^{-t}\\) 负指数。锚点:1−d=v,v 的幂天然是折现。</li><li>恒有 \\(d\\lt i\\)(分母更大)。</li></ul><p><strong>算一遍</strong>:d=10%,<span>$</span>100 存三年的 AV。</p><ul><li>积累用负指数:\\(AV=100(1-.10)^{-3}\\)。</li><li>\\(=100/0.729=\\$137.17\\) ✓(ASM Ex 1.16)</li><li>反向核对:137.17×0.9³=100 ✓</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"实际利率\">实际利率</a> — 同一笔利息、两个分母;i−d=id</li><li><a class=\"net-wl\" data-id=\"现值与折现因子\">现值与折现因子</a> — 1−d=v 一体两面</li><li><a class=\"net-wl\" data-id=\"名义利率\">名义利率</a> — d^(m) 是它的 m 次复利版</li><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 期初年金分母是 d(\"i 配 immediate,d 配 due\")</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"利率五种读数的换算体系\">利率五种读数的换算体系</a></li></ul>"}, {"id": "年金基本符号", "type": "c", "level": "basic", "chapter": "fm-l03", "status": "wip", "en": "AnnuityCertain", "rels": ["现值与折现因子", "永续年金", "递延年金", "错拍年金", "等差年金", "等比年金", "贷款摊还"], "html": "<h4>定义</h4><p>年金 = 规则付款串(本质是换名字的几何级数)。四大符号:期末年金现值 \\(a_{\\overline{n}|}\\)、其终值 \\(s_{\\overline{n}|}\\)(末付当日);期初年金 \\(\\ddot a_{\\overline{n}|}\\)、其终值 \\(\\ddot s_{\\overline{n}|}\\)(末付后一期)。<strong>immediate/due 不是年金的属性,是估值日的位置</strong>。</p><p><strong>白话</strong>:付款串是固定风景,a/ä/s/s̈ 是四个机位拍的照片;搞清相机摆哪,符号自动对。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$a_{\\overline{n}|}=\\frac{1-v^n}{i}\\quad s_{\\overline{n}|}=\\frac{(1+i)^n-1}{i}\\quad \\ddot a_{\\overline{n}|}=\\frac{1-v^n}{d}\\quad \\ddot s_{\\overline{n}|}=\\frac{(1+i)^n-1}{d}$$</div><ul><li>记忆:<strong>i 配 immediate,d 配 due</strong>(分母首字母)。</li><li>关系式:\\(\\ddot a=(1+i)a=1+a_{\\overline{n-1}|}\\);\\(\\ddot s=(1+i)s=s_{\\overline{n+1}|}-1\\);\\(s=(1+i)^n a\\)。</li><li>铁律:n 笔付款在末付当日的 AV <strong>恒为</strong> \\(s_{\\overline{n}|}\\),与时间轴编号无关。</li><li>口头证明:存 <span>$</span>1,每年末取息 i、第 n 年取回本金——\"每年 i + 期末 1\"的现值恰为 1。</li><li>比值技巧:\\(a_{\\overline{2n}|}/a_{\\overline{n}|}=1+v^n\\)(倍长年金解 i 的标准路)。</li></ul><p><strong>算一遍</strong>:已知 \\(a_{\\overline{n}|}=7.9127\\)、\\(\\ddot a_{\\overline{n}|}=8.2688\\),求 n。</p><ul><li>\\(\\ddot a/a=1+i=1.045\\Rightarrow i=4.5\\%\\)。</li><li>TVM:4.5 I/Y、7.9127 PV、1 +/- PMT、CPT N → n=10 ✓(ASM Ex 3.5)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"现值与折现因子\">现值与折现因子</a> — a 就是 v 的幂级数和</li><li><a class=\"net-wl\" data-id=\"永续年金\">永续年金</a> — n→∞ 的极限</li><li><a class=\"net-wl\" data-id=\"递延年金\">递延年金</a> — 加时间平移</li><li><a class=\"net-wl\" data-id=\"错拍年金\">错拍年金</a> — 付款计息不同拍的推广</li><li><a class=\"net-wl\" data-id=\"等差年金\">等差年金</a> / <a class=\"net-wl\" data-id=\"等比年金\">等比年金</a> — 变额推广</li><li><a class=\"net-wl\" data-id=\"贷款摊还\">贷款摊还</a> — 余额前瞻/追溯全用 a、s 表达</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — TVM 五键 + BGN 陷阱</li><li><a class=\"net-wl\" data-id=\"通胀年金与真实利率的等价\">通胀年金与真实利率的等价</a> — 等比增长年金 ↔ 真实利率折算的等价</li></ul>"}, {"id": "收益率曲线", "type": "c", "level": "basic", "chapter": "fm-l09", "status": "wip", "en": "YieldCurve", "rels": ["即期利率", "远期利率", "债券定价"], "html": "<h4>定义</h4><p>不同期限的利率集合(图形或表格),也叫<strong>利率期限结构</strong>。前 8 章\"一个利率管全期限\"的假设在此推翻:利率随期限变化,通常(不总是)期限越长利率越高——spot 随期限递增的形状叫 upward-sloping / normal。</p><p><strong>白话</strong>:利率的价目表按\"存多久\"标价;正常形态是\"存得久给得多\"。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\text{曲线上每个点} = r_t\\ (\\text{t 年期零息债年化})\\qquad P=\\sum_t CF_t(1+r_t)^{-t}$$</div><ul><li>FM 只考换算与定价;形态与经济周期的关系(倒挂预示衰退等)是 FAM/面试素材。</li><li>曲线给定 ⇒ 全部 implied forward 同时给定(见 <a class=\"net-wl\" data-id=\"远期利率\">远期利率</a>)。</li></ul><p><strong>算一遍</strong>:由零息债价格表反推曲线(面值 1):P₂=0.91。</p><ul><li>\\(r_2=P_2^{-1/2}-1=0.91^{-1/2}-1\\)。</li><li>\\(=1.048285-1=4.8285\\%\\) ✓(ASM Ex 9.5)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"即期利率\">即期利率</a> — 曲线的纵轴</li><li><a class=\"net-wl\" data-id=\"远期利率\">远期利率</a> — 曲线隐含的段速</li><li><a class=\"net-wl\" data-id=\"债券定价\">债券定价</a> — 多现金流沿曲线逐笔折现</li></ul>"}, {"id": "永续年金", "type": "c", "level": "basic", "chapter": "fm-l03", "status": "wip", "en": "Perpetuity", "rels": ["年金基本符号", "递延年金", "实际贴现率", "久期"], "html": "<h4>定义</h4><p>每年付 \\(1、永远付下去的年金;正利率下现值有限:期末版 \\)a_{\\overline{\\infty}|}=1/i\\(,期初版 \\)\\ddot a_{\\overline{\\infty}|}=1/d<span>$</span>。</p><p><strong>白话</strong>:存 \\(\\frac1i\\) 进利率 i 的银行,每年末取利息 <span>$</span>1、本金永远不动——这就是 1/i 的口头证明。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$a_{\\overline{\\infty}|}=\\frac1i\\qquad \\ddot a_{\\overline{\\infty}|}=\\frac1d\\qquad \\frac1d-\\frac1i=1\\qquad {}_{n|}a_{\\overline{\\infty}|}=\\frac{v^n}{i}$$</div><ul><li>1/d − 1/i = 1:两个永续年金只差 time 0 那一笔。</li><li>定期年金 = 永续 − 递延永续:\\(a_{\\overline{n}|}=\\frac1i-\\frac{v^n}{i}\\)(虚拟付款玩法)。</li><li>增额版见 <a class=\"net-wl\" data-id=\"等差年金\">等差年金</a>:\\((Ia)_{\\overline{\\infty}|}=\\frac1i+\\frac1{i^2}\\)。</li><li>措辞陷阱:\"10-year deferred perpetuity-immediate\" 首付在 <strong>10.5 年</strong>(递延后 immediate 还要再等一期)。</li></ul><p><strong>算一遍</strong>:永续年金前 10 年 <span>$</span>100/年、次 10 年 <span>$</span>150、以后 <span>$</span>200,i=3.85%。</p><ul><li>分块从最远起步:\\(PV=\\frac{200}{i}-50a_{\\overline{20}|}-50a_{\\overline{10}|}\\)。</li><li>\\(=5{,}194.81-687.30-409.93=\\$4{,}097.58\\) ✓(ASM Ex 3.22)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — n→∞ 极限</li><li><a class=\"net-wl\" data-id=\"递延年金\">递延年金</a> — 组合出定期年金</li><li><a class=\"net-wl\" data-id=\"实际贴现率\">实际贴现率</a> — 1/d 的来源</li><li><a class=\"net-wl\" data-id=\"久期\">久期</a> — 永续年金久期 = (1+i)/i</li></ul>"}, {"id": "现值与折现因子", "type": "c", "level": "basic", "chapter": "fm-l01", "status": "wip", "en": "PresentValue", "rels": ["积累函数", "实际贴现率", "价值方程", "年金基本符号"], "html": "<h4>定义</h4><p>反向问题:今天投多少,t 时刻恰好 \\(1?\\)PV\\cdot a(t)=1\\Rightarrow PV=\\frac{1}{a(t)}\\((贴现函数)。复利下 \\)PV=v^t\\(,其中 \\)v=\\frac{1}{1+i}<span>$</span> 是<strong>折现因子</strong>。精算全行业(年金、寿险给付、或有事件)都建在这上面。</p><p><strong>白话</strong>:未来钱的今日标价;v 是\"明年一块钱今天值几毛\"的汇率。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$v=\\frac{1}{1+i}=1-d\\qquad PV=v^t=(1+i)^{-t}$$</div><ul><li>\\(v^n\\) 与 \\((1+i)^n\\) 互逆:见到 \\(v^n=0.5\\) 先翻成 \\((1+i)^n=2\\),常一步出答案。</li><li>\\(1-v=iv=d\\):年金公式化简的万能钥匙。</li></ul><p><strong>算一遍</strong>:\\(v^n=0.5\\),时刻 0、n、2n 各存 <span>$</span>1,求时刻 3n 的 AV。</p><ul><li>翻译:\\((1+i)^n=2\\)。</li><li>各笔分别滚 3n、2n、n:\\(2^3+2^2+2=14\\) ✓(ASM Ex 1.12)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"积累函数\">积累函数</a> — 贴现函数是它的倒数</li><li><a class=\"net-wl\" data-id=\"实际贴现率\">实际贴现率</a> — 1−d=v 一体两面</li><li><a class=\"net-wl\" data-id=\"价值方程\">价值方程</a> — 把钱搬到比较日全靠 v 的幂</li><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — a 角标 n 就是 v 的幂级数和</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"利率五种读数的换算体系\">利率五种读数的换算体系</a></li></ul>"}, {"id": "真实利率", "type": "c", "level": "advanced", "chapter": "fm-l05", "status": "wip", "en": "RealRateOfInterest", "rels": ["实际利率", "等比年金", "名义利率"], "html": "<h4>定义</h4><p>剔除通胀后的购买力增长率:市场利率 i、通胀率 r,则 \\(i'=\\frac{i-r}{1+r}\\)。咖啡例:投 <span>$</span>100@5%,咖啡从 <span>$</span>10 涨到 <span>$</span>10.30——年末能买的磅数只多 1.942%。</p><p><strong>白话</strong>:利率是钱变多的速度,通胀是东西变贵的速度,真实利率是你能多买多少东西的速度。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$i'=\\frac{i-r}{1+r}\\qquad 1+i=(1+i')(1+r)\\qquad i=i'+r+i'r\\qquad 1+i'=\\frac{1+i}{1+r}$$</div><ul><li>低通胀才可近似 \\(i'\\approx i-r\\);高通胀直接翻车(i=60%、r=50%:真值 6.667%,近似 10%)。</li><li><strong>通胀年金 ≡ 真实利率下的水平年金</strong>:付款按 r 几何递增、按 i 折现 ⇔ 付款水平、按 i′ 折现——TVM 一键。</li><li>术语撞车:经济学 \"nominal rate\" = 含通胀市场利率,与 FM 的<a class=\"net-wl\" data-id=\"名义利率\">名义利率</a>同词不同义;通胀由 CPI 度量。</li></ul><p><strong>算一遍</strong>:i=6%,来年真实利率 4%,求通胀率。</p><ul><li>\\(.04=\\frac{.06-r}{1+r}\\)。</li><li>\\(.04+.04r=.06-r\\Rightarrow 1.04r=.02\\)。</li><li>r=1.923% ✓(ASM Ex 5.8)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"实际利率\">实际利率</a> — 市场口径 vs 购买力口径</li><li><a class=\"net-wl\" data-id=\"等比年金\">等比年金</a> — 通胀年金的数学本体</li><li><a class=\"net-wl\" data-id=\"名义利率\">名义利率</a> — 同词不同义警告</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"通胀年金与真实利率的等价\">通胀年金与真实利率的等价</a></li></ul>"}, {"id": "积累函数", "type": "c", "level": "basic", "chapter": "fm-l01", "status": "wip", "en": "AccumulationFunction", "rels": ["实际利率", "实际贴现率", "利息力", "现值与折现因子"], "html": "<h4>定义</h4><p>时刻 0 投入 \\(1,在时刻 t 的积累值(AV),记 \\)a(t)\\(;\\)a(0)\\equiv 1\\(。金额函数 \\)A(t)=k\\,a(t)<span>$</span> 是起投 k 元的版本,两者只差常数倍。FM 全书五种利率(i、d、i^(m)、d^(m)、δ)都是给这条曲线做\"读数\"。</p><p><strong>白话</strong>:一块钱种下去长成的那条生长曲线——存钱罐是水平线,单利是直线,复利是指数。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$a(t)=1+it\\ (\\text{单利})\\qquad a(t)=(1+i)^t\\ (\\text{复利})\\qquad a(t)=\\prod_{j=1}^{t}(1+i_j)\\ (\\text{链乘})$$</div><ul><li>本课程的 a(t) 一般连续且递增;考试默认复利。</li><li>单利下实际利率 \\(i_t=\\frac{i}{1+i(t-1)}\\) 双曲递减——\"simple interest isn't so simple\"。</li><li>波动利率的链乘积:算术平均相同时,波动越大乘积越小(ASM Ex 1.10,差额 <span>$</span>0.58/千元)。</li></ul><p><strong>算一遍</strong>:A(t)=4t²+8t+4,求 a(t) 与 i₅。</p><ul><li>\\(a(t)=A(t)/A(0)=t^2+2t+1\\)。</li><li>\\(i_5=\\frac{A(5)-A(4)}{A(4)}=\\frac{144-100}{100}=44\\%\\)。</li><li>核对:a 与 A 定义利率同款(k 相消)✓</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"实际利率\">实际利率</a> — a(t) 的年度读数(年初为基)</li><li><a class=\"net-wl\" data-id=\"实际贴现率\">实际贴现率</a> — 年末为基的读数</li><li><a class=\"net-wl\" data-id=\"利息力\">利息力</a> — a(t) 的瞬时读数 a′/a;由 δ 还原 a(t)=e^∫δ</li><li><a class=\"net-wl\" data-id=\"现值与折现因子\">现值与折现因子</a> — 贴现函数 = 1/a(t)</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"利率五种读数的换算体系\">利率五种读数的换算体系</a> — 一条曲线五种报速方式</li></ul>"}, {"id": "等差年金", "type": "c", "level": "hard", "chapter": "fm-l04", "status": "wip", "en": "AnnuityInArithmeticProgression", "rels": ["年金基本符号", "永续年金", "等比年金", "再投资利率"], "html": "<h4>定义</h4><p>付款 P, P+Q, P+2Q, …(P 首付、Q 公差)的年金。特例:P=Q=1 为增额年金 (Ia);P=n、Q=−1 为减额年金 (Da)。FM 单一最大考区(ASM 4h–4i 独占 48 题)。</p><p><strong>白话</strong>:增额年金 = n 个错峰起跑的级别年金叠罗汉——所以公式分子里藏着 ä。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$PV=P\\,a_{\\overline{n}|}+Q\\,\\frac{a_{\\overline{n}|}-nv^n}{i}\\qquad (Ia)_{\\overline{n}|}=\\frac{\\ddot a_{\\overline{n}|}-nv^n}{i}\\qquad (Da)_{\\overline{n}|}=\\frac{n-a_{\\overline{n}|}}{i}$$</div><div class=\"net-mth\">$$(Is)_{\\overline{n}|}=\\frac{s_{\\overline{n+1}|}-(n+1)}{i}\\qquad (Ia)_{\\overline{\\infty}|}=\\frac1i+\\frac1{i^2}\\qquad PV_{P\\&amp;Q\\ \\text{永续}}=\\frac{P}{i}+\\frac{Q}{i^2}$$</div><ul><li>TVM 直按:<strong>PMT = P+Q/i,FV = −nQ/i</strong>(Calculator Notes #6)。</li><li>先增后平永续 1,2,…,n,n,…:\\(PV=\\ddot a_{\\overline{n}|}/i\\)(n 个递延永续各值 1/i)。</li><li>易错:(Ia) 分子是 ä 不是 a;(Is) 用 s̈−n;FV 忘取负。</li><li>回文年金 1..n..1:\\(PV=a_{\\overline{n}|}\\ddot a_{\\overline{n}|}\\)(金字塔切平板)。</li></ul><p><strong>算一遍</strong>:首付 3、年增 2 的永续年金 PV=406.81,求 i。</p><ul><li>\\(\\frac3i+\\frac2{i^2}=406.81\\)。</li><li>\\(406.81i^2-3i-2=0\\),求根取正。</li><li>i=7.39% ✓(ASM Ex 4.23)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 级别版特例</li><li><a class=\"net-wl\" data-id=\"永续年金\">永续年金</a> — 增额永续的底座</li><li><a class=\"net-wl\" data-id=\"等比年金\">等比年金</a> — \"increase by X\" vs \"increase by X%\" 的对家</li><li><a class=\"net-wl\" data-id=\"再投资利率\">再投资利率</a> — 利息流常成 (Is) 形</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — P&amp;Q 的 TVM 变形</li></ul>"}, {"id": "等时法", "type": "c", "level": "advanced", "chapter": "fm-l02", "status": "wip", "en": "MethodOfEquatedTime", "rels": ["价值方程", "现值与折现因子", "久期"], "html": "<h4>定义</h4><p>\"一笔等于各期付款总和的单笔付款该付在哪天?\"精确解要解方程;等时法用<strong>金额加权平均时间</strong> \\(\\bar t\\) 一步近似。</p><p><strong>白话</strong>:把每块钱看作站在时间轴上的人,\\(\\bar t\\) 是按体重(金额)加权的重心。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$\\bar t=\\frac{\\sum_k A_k t_k}{\\sum_k A_k}\\qquad\\text{精确: }\\Bigl(\\sum_k A_k\\Bigr)v^t=\\sum_k A_k v^{t_k}$$</div><ul><li>与利率无关;正利率下<strong>恒大于</strong>精确值(折现是凸的,重心偏晚)。</li><li>权重是<strong>金额</strong>,不是时点简单平均。</li><li>考题常同时要两个值或其差(PV 差额化:单笔付偏晚 ⇒ PV 偏小)。</li></ul><p><strong>算一遍</strong>:付款 5、1、15 于时点 1、3、10。</p><ul><li>\\(\\bar t=\\frac{5(1)+1(3)+15(10)}{21}=\\frac{158}{21}=7.52\\)。</li><li>i=5% 时精确 t=7.12。</li><li>核对性质:7.52 &amp;gt; 7.12(恒偏大)✓(ASM p.79)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"价值方程\">价值方程</a> — 精确解就是一条价值方程</li><li><a class=\"net-wl\" data-id=\"现值与折现因子\">现值与折现因子</a> — 偏差来源于折现的凸性</li><li><a class=\"net-wl\" data-id=\"久期\">久期</a> — 同为\"金额/PV 加权平均时间\",D_mac 是 PV 加权版</li></ul>"}, {"id": "等比年金", "type": "c", "level": "advanced", "chapter": "fm-l04", "status": "wip", "en": "AnnuityInGeometricProgression", "rels": ["年金基本符号", "等差年金", "真实利率", "即期利率"], "html": "<h4>定义</h4><p>付款逐期 ×(1+k) 的年金(现实原型:通胀挂钩 COLA)。核心 trick:<strong>等价于调整利率 i′ 下的级别年金</strong>。</p><p><strong>白话</strong>:付款每年在涨(×(1+k))、折现每年在压(÷(1+i)),两效应对冲后剩下的净利率就是 i′——世界重新变平。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$PV=\\frac{1-\\bigl(\\frac{1+k}{1+i}\\bigr)^n}{i-k}\\qquad 1+i'=\\frac{1+i}{1+k}\\ \\Leftrightarrow\\ i'=\\frac{i-k}{1+k}$$</div><ul><li>分母是 i−k 不是 i;调整率别忘除 (1+k)。</li><li>k 为负(逐期打折)直接套;k=通胀率时 i′ 就是<a class=\"net-wl\" data-id=\"真实利率\">真实利率</a>。</li><li>due/immediate 差一个 v 或 (1+i)。</li></ul><p><strong>算一遍</strong>:15 年 immediate、首付 <span>$</span>1,000、逐年 ×1.03、i=5.25%。</p><ul><li>调整率:\\(i'=\\frac{.0525-.03}{1.03}=2.1845\\%\\)。</li><li>\\(PV=\\frac{1000}{1.0525}\\ddot a_{\\overline{15}|i'}\\)。</li><li>= <span>$</span>12,304.56 ✓(通式复算同值,ASM Ex 4.26/4.27)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 级别化后的落点</li><li><a class=\"net-wl\" data-id=\"等差年金\">等差年金</a> — 等差 vs 等比,读题关键词区分</li><li><a class=\"net-wl\" data-id=\"真实利率\">真实利率</a> — 通胀年金 ≡ 真实利率下的水平年金</li><li><a class=\"net-wl\" data-id=\"即期利率\">即期利率</a> — 变利率折现的另一个世界</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"通胀年金与真实利率的等价\">通胀年金与真实利率的等价</a></li></ul>"}, {"id": "贷款尾款与再融资", "type": "c", "level": "advanced", "chapter": "fm-l06", "status": "wip", "en": "BalloonDropAndRefinance", "rels": ["贷款摊还", "价值方程", "年金基本符号"], "html": "<h4>定义</h4><p>CPT N 出非整数(如 14.2067)时的两种收尾:<strong>balloon</strong> = 第 ⌊N⌋ 期付款加大;<strong>drop</strong> = 第 ⌈N⌉ 期付一笔小于正常的尾款。<strong>再融资</strong>通法:旧条款算时点余额,令其等于新条款付款的 PV。</p><p><strong>白话</strong>:最后一片香肠切不齐——要么最后一刀切厚点(balloon),要么多切一刀薄的(drop);再融资 = 旧账翻结、重新开局。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$L=R\\,a_{\\overline{\\lfloor N\\rfloor}|}+X_1v^{\\lfloor N\\rfloor}=R\\,a_{\\overline{\\lfloor N\\rfloor}|}+X_2v^{\\lceil N\\rceil}\\qquad X_2=(1+i)X_1$$</div><div class=\"net-mth\">$$\\text{再融资: } B_t^{\\text{旧条款}}=R'\\,a_{\\overline{m}|j}^{\\text{新条款}}\\quad(\\text{追加一次性还款 }X\\text{ 先扣})$$</div><ul><li>计算器 FV 符号定补/退:⌊N⌋ N CPT FV 为<strong>负</strong> = 还要补(balloon);⌈N⌉ N CPT FV 为<strong>正</strong> = 超付退回(drop = R − FV)。</li><li>再融资余额<strong>必须用旧条款算</strong>;利率表述先统一到付款频率的期利率。</li></ul><p><strong>算一遍</strong>:<span>$</span>10,000、5%、年付 <span>$</span>1,000,CPT N=14.2067。</p><ul><li>balloon:14 N CPT FV → −200.68 ⇒ 第 14 期总付 1,200.68。</li><li>drop:15 N CPT FV → +789.28 ⇒ 第 15 期付 210.72。</li><li>核对:\\(X_2=1.05\\times 200.68=210.71\\) ✓ 差一年利息(ASM p.311–312)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"贷款摊还\">贷款摊还</a> — 余额是两问的共同起点</li><li><a class=\"net-wl\" data-id=\"价值方程\">价值方程</a> — 再融资通法就是一条价值方程</li><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 非整数 N 的来源</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — FV 符号读法</li></ul>"}, {"id": "贷款摊还", "type": "c", "level": "basic", "chapter": "fm-l06", "status": "wip", "en": "LoanAmortization", "rels": ["年金基本符号", "贷款尾款与再融资", "债券溢价与折价", "等差年金"], "html": "<h4>定义</h4><p>逐期付款把贷款\"杀死\"(amortize 词根 mort=死亡):每期付款先付利息(按期初余额)、剩余还本。摊还表 = 利息/本金/余额三列机器,任何现值 = 贷款额的付款流都能跑。</p><p><strong>白话</strong>:每期月供 = 房租(利息)+ 赎楼款(本金);余额越还越小、房租越交越少,赎楼份额按 (1+i) 等比滚雪球——\"前期还的几乎全是利息\"的数学版。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$I_t=iB_{t-1}\\qquad P_t=R_t-I_t\\qquad B_t=B_{t-1}-P_t\\qquad P_{t+s}=P_t(1+i)^s$$</div><p>等额付款(R = L/a)任意一行直取:</p><div class=\"net-mth\">$$I_t=R(1-v^{\\,n-t+1})\\qquad P_t=Rv^{\\,n-t+1}\\qquad B_t=Ra_{\\overline{n-t}|}$$</div><ul><li>余额双视角:<strong>前瞻</strong> \\(B_t=Ra_{\\overline{n-t}|}\\)(剩余付款 PV);<strong>追溯</strong> \\(B_t=L(1+i)^t-Rs_{\\overline{t}|}\\)(勿漏滚息!)。</li><li>本金等比步数别多一:P₁→P₁₀ 是 ×(1+i)⁹;贷款额 = 全部本金之和。</li><li>付款 &amp;lt; 利息 ⇒ 负摊还(余额回血,利息资本化);等额本金 ≠ 等额付款(付款等差递减)。</li><li>AMORT 工作表:P1/P2 区间合计 PRN/INT + BAL 一键取。</li></ul><p><strong>算一遍</strong>:15 年贷款、7%,第 5 期本金 <span>$</span>187,求贷款额。</p><ul><li>从 P₅ 等比双向铺满 15 期:向前折 4 步、向后滚 10 步。</li><li>\\(L=187(a_{\\overline{4}|}+s_{\\overline{11}|})=187(3.3872+15.7836)\\)。</li><li>= <span>$</span>3,585 ✓(ASM Ex 6.3)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 余额表达全用 a、s</li><li><a class=\"net-wl\" data-id=\"贷款尾款与再融资\">贷款尾款与再融资</a> — 非整期收尾与条款重谈</li><li><a class=\"net-wl\" data-id=\"债券溢价与折价\">债券溢价与折价</a> — 同一台机器换名字(book value↔余额)</li><li><a class=\"net-wl\" data-id=\"等差年金\">等差年金</a> — 等额本金的付款串是等差</li></ul><h4>应用视角</h4><ul><li><a class=\"net-wl\" data-id=\"FM考试的BA II Plus操作体系\">FM考试的BA II Plus操作体系</a> — AMORT 工作表</li></ul>"}, {"id": "远期利率", "type": "c", "level": "advanced", "chapter": "fm-l09", "status": "wip", "en": "ForwardRate", "rels": ["即期利率", "收益率曲线", "利息力"], "html": "<h4>定义</h4><p>将来某时点起投的投资将赚的年实际利率:\\(f_{[t_1,t_2]}\\) = 时点 t₁→t₂ 生效的年化。\"m-year forward rate, deferred t years\" = \\(f_{[t,\\,t+m]}\\)(<strong>deferred 的 t 是起投时点,m 是生效年数</strong>)。术语无统一标准,考题会当场定义。</p><p><strong>白话</strong>:预订将来的存款利率——今天的 spot 曲线已隐含它,借短投长就能锁定,不用预测未来。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$(1+r_{t_1})^{t_1}\\,(1+f_{[t_1,t_2]})^{t_2-t_1}=(1+r_{t_2})^{t_2}\\qquad 1+r_t=\\Bigl[\\prod_{j=0}^{t-1}(1+f_{[j,j+1]})\\Bigr]^{1/t}$$</div><ul><li><strong>两条路一个终点</strong>:spot 直达 vs spot 接力 forward,否则有套利;幂次自查两边总时长相等。</li><li>spot 是 forward 链的<strong>几何平均</strong>;\\(f_{[0,1]}=r_1\\)。</li><li>锁定构造:借 1 年期 <span>$</span>1 + 投 2 年零息 ⇒ 时点 0 净流 0,forward 落袋。</li><li>要折现因子直接求因子,别绕道解出中间利率(Ex 9.8 原文点名)。</li></ul><p><strong>算一遍</strong>:r₁=5%、r₂=5.5%,求 f₍₁,₂₎。</p><ul><li>两条路:\\((1.05)(1+f)=1.055^2\\)。</li><li>\\(1+f=1.113025/1.05=1.060024\\)。</li><li>f=6.0024% ✓(ASM p.419)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"即期利率\">即期利率</a> — 互推核心等式</li><li><a class=\"net-wl\" data-id=\"收益率曲线\">收益率曲线</a> — 隐含 forward 的载体</li><li><a class=\"net-wl\" data-id=\"利息力\">利息力</a> — a(t₂)/a(t₁) 视角同一动作(1g)</li></ul>"}, {"id": "递延年金", "type": "c", "level": "basic", "chapter": "fm-l03", "status": "wip", "en": "DeferredAnnuity", "rels": ["年金基本符号", "永续年金", "价值方程"], "html": "<h4>定义</h4><p>整体推迟 m 期的年金:\\({}_{m|}a_{\\overline{n}|}\\) 读作\"到 time m 去,按符号右侧付款\"。</p><p><strong>白话</strong>:同一串付款往后挪 m 格;要么打折(v^m),要么摆虚拟付款再减掉。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$${}_{m|}a_{\\overline{n}|}=v^m a_{\\overline{n}|}=a_{\\overline{m+n}|}-a_{\\overline{m}|}={}_{m+1|}\\ddot a_{\\overline{n}|}$$</div><ul><li>同一串付款(5–12 时点)的多种写法:\\(v^4a_{\\overline{8}|}=v^5\\ddot a_{\\overline{8}|}=v^{12}s_{\\overline{8}|}=v^{13}\\ddot s_{\\overline{8}|}\\)——\"now you see it\" 游戏。</li><li>分块付款速记:PV 从离比较日最远的块起步(a),AV 从首笔起步(s),变额点加减。</li></ul><p><strong>算一遍</strong>:已知 \\(a_{\\overline{n}|}=10\\),且 n 年递延 n 年年金 PV=5。</p><ul><li>\\(v^n a_{\\overline{n}|}=5\\Rightarrow v^n=0.5\\)。</li><li>代回:\\(10=\\frac{1-0.5}{i}\\Rightarrow i=5\\%\\) ✓(ASM Ex 3.15)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 平移前的本体</li><li><a class=\"net-wl\" data-id=\"永续年金\">永续年金</a> — 递延永续 v^n/i;两者相减得定期年金</li><li><a class=\"net-wl\" data-id=\"价值方程\">价值方程</a> — 平移 = 换比较日</li></ul>"}, {"id": "错拍年金", "type": "c", "level": "hard", "chapter": "fm-l04", "status": "wip", "en": "MthlyAnnuity", "rels": ["年金基本符号", "名义利率", "利息力", "等差年金"], "html": "<h4>定义</h4><p>付款频率与计息期不一致的年金(off-payments):付款可比计息期更疏(每 5 年一笔)或更密(每月一笔)。两条路线:①换等效利率 j 当普通年金(数值题);②fission/fusion 改造付款 + m-thly 符号(符号题)。m→∞ 即连续年金 \\(\\bar a\\)。</p><p><strong>白话</strong>:钟表和付款不同拍——要么把钟调到同拍(换利率),要么把付款改拍(拆笔/并笔),现值不变。</p><h4>关键性质 / 公式</h4><div class=\"net-mth\">$$j=(1+i)^k-1\\qquad PV_{\\text{每 }k\\text{ 期末付 }1}=\\frac{a_{\\overline{n}|}}{s_{\\overline{k}|}}\\qquad a^{(m)}_{\\overline{n}|}=\\frac{1-v^n}{i^{(m)}}=\\frac{i}{i^{(m)}}a_{\\overline{n}|}\\qquad \\bar a_{\\overline{n}|}=\\frac{1-v^n}{\\delta}$$</div><ul><li><strong>系数陷阱</strong>(4c):\\(a^{(m)}\\) 前系数 = 一个<strong>计息期</strong>内的付款总和(检验:÷m = 单笔);m 由\"计息期内几笔\"定,不由\"每年几笔\"定。</li><li>符号即公式:PV 分子恒 \\(1-v^n\\),分母 a→i、ä→d、(m)→\\(i^{(m)}/d^{(m)}\\)、bar→δ。</li><li>同利率下\"双点约掉\":\\(\\frac{a^{(m)}_{\\overline{2n}|}}{a^{(m)}_{\\overline{n}|}}=1+v^n\\);利率不同则非法。</li></ul><p><strong>算一遍</strong>:每 5 年末付 1、共 40 年、i=5%。</p><ul><li>法一:\\(j=1.05^5-1=27.6282\\%\\),\\(PV=a_{\\overline{8}|j}=3.1054\\)。</li><li>法二 fission:\\(PV=a_{\\overline{40}|}/s_{\\overline{5}|}=17.1591/5.5256=3.1054\\) ✓ 两法同值(ASM Ex 4.1/4.5)</li></ul><h4>与其他概念的关系</h4><ul><li><a class=\"net-wl\" data-id=\"年金基本符号\">年金基本符号</a> — 变形前的本体</li><li><a class=\"net-wl\" data-id=\"名义利率\">名义利率</a> — i^(m) 分母的来源</li><li><a class=\"net-wl\" data-id=\"利息力\">利息力</a> — 连续年金分母 δ</li><li><a class=\"net-wl\" data-id=\"等差年金\">等差年金</a> — (Ia)^(m) 双重变形</li></ul>"}, {"id": "FM考试的BA II Plus操作体系", "type": "a", "level": "advanced", "chapter": "fm-l03", "status": "wip", "en": "", "rels": ["年金基本符号", "贷款摊还", "债券定价", "净现值与内部收益率", "名义利率", "等差年金"], "html": "<p><strong>题型</strong>:一切数值题。四个工作表 + 两组常规键覆盖全卷。</p><h4>开考设置(一次做对)</h4><ol><li><code>2nd FORMAT</code> → DEC=4;计算方式保持 <strong>Chn</strong>。</li><li><code>2nd P/Y</code> → <strong>P/Y=C/Y 永远 =1</strong>(监考 RESET 后老款出厂 P/Y=12,坐下先重设)。</li><li><strong>每题开算前 <code>2nd CLR TVM</code></strong>(关机不清寄存器)。</li></ol><h4>工作表分工</h4><table><thead><tr><th>场景</th><th>键组</th><th>要点</th></tr></thead><tbody><tr><td>年金/贷款/债券定价</td><td>TVM 五键</td><td>PV 与 PMT/FV <strong>反号</strong>;I/Y 按百分数;due 用 ×(1+i) 免开 BGN(开了必切回)</td></tr><tr><td>等差年金</td><td>TVM 变形</td><td><strong>PMT=P+Q/i,FV=−nQ/i</strong>(P&amp;Q 式变形)</td></tr><tr><td>摊还表任意区间</td><td><code>2nd AMORT</code></td><td>P1/P2 → BAL(P2 期付款后)/ PRN / INT(区间<strong>合计</strong>)</td></tr><tr><td>非水平现金流</td><td><code>CF</code>+<code>NPV</code>/<code>IRR</code></td><td>数字后必 ENTER;0 现金流年按 ENTER 跳过;频数 F 别当现金流;先 <code>2nd CLR WORK</code></td></tr><tr><td>名义↔实际</td><td><code>2nd ICONV</code></td><td>NOM/EFF/C/Y 三寄存器;贴现率不支持,用常规键</td></tr><tr><td>利息力</td><td><code>LN</code> / <code>2nd e^x</code></td><td>δ=ln(1+i);e^{∫δ} 先积分后取幂</td></tr></tbody></table><h4>高频翻车榜</h4><ol><li>BGN 忘切回(CLR TVM 清不掉它)——下一题全错。</li><li>CPT I/Y 出的是<strong>每期率</strong>,忘 ×2(名义)或平方(年有效)。</li><li>CPT N 非整数直接四舍五入——必须分 balloon/drop(FV 符号定补退,见 <a class=\"net-wl\" data-id=\"贷款尾款与再融资\">贷款尾款与再融资</a>)。</li><li>IRR 多解时计算器只报一个根(见 <a class=\"net-wl\" data-id=\"净现值与内部收益率\">净现值与内部收益率</a>)。</li></ol>"}, {"id": "利率五种读数的换算体系", "type": "a", "level": "advanced", "chapter": "fm-l01", "status": "wip", "en": "", "rels": ["实际利率", "实际贴现率", "名义利率", "利息力", "现值与折现因子"], "html": "<p><strong>题型</strong>:同一段增长,题目用 A 口径报价、要 B 口径的答案(如\"季复利名义贴现率 ⟺ 利息力\")。FM 第一章的主战场,后续每章都在复用。</p><h4>一条总等式走到底</h4><div class=\"net-mth\">$$1+i=\\Bigl(1+\\frac{i^{(m)}}{m}\\Bigr)^m=\\Bigl(1-\\frac{d^{(m)}}{m}\\Bigr)^{-m}=e^{\\delta}=\\frac1v$$</div><p>任意两个口径互换:各自表达成\"一年的积累因子\",令相等,解目标变量。<strong>统一以一年期写方程</strong>最不易错(ASM §1h 心法)。</p><h4>考场三步</h4><ol><li><strong>翻译</strong>:每个报价先化成\"每期实际利率 + 期长\"(名义 ÷ m;贴现看清指数方向;δ 先积分)。</li><li><strong>对齐</strong>:两边写成同一时段的积累式(幂次自查:总时长相等)。</li><li><strong>反解</strong>:开 m 次方回名义口径;计算器 ICONV 只管 i↔i^(m),贴现率用常规键。</li></ol><h4>易错</h4><ul><li>d 的指数方向与 i 相反:贴现 \\((1-d)^t\\)、积累 \\((1-d)^{-t}\\)。</li><li>变利率下\"等价\"必须指明时段——没有全局等价利率。</li><li>经济学的 \"nominal rate\"(含通胀市场利率)与 FM 名义利率同词不同义(见 <a class=\"net-wl\" data-id=\"真实利率\">真实利率</a>)。</li></ul>"}, {"id": "资产负债免疫的三层防护", "type": "a", "level": "hard", "chapter": "fm-l08", "status": "wip", "en": "", "rels": ["免疫策略", "久期", "凸性", "债券定价"], "html": "<p><strong>题型</strong>:给负债串 + 可选资产(常为两只零息债),解面值 X、Y 使组合免疫——Ch8 免疫区的标准形。</p><h4>解题动线(Ex 8.19 模板)</h4><ol><li><strong>条件一列 PV 等式</strong>:\\(\\sum v^tA_t=\\sum v^tL_t\\)。</li><li><strong>条件二列导数等式</strong>:\\(P'_A=P'_L\\),用 \\(\\frac{d}{di}v^n=-nv^{n+1}\\)(或等价地令 D_mac 相等)。</li><li><strong>二元一次联立解 X、Y</strong>;考试默认第三条件(凸性)可满足,题目要验时算 \\(\\sum t^2v^t\\) 比大小。</li></ol><h4>层级选择(读题关键词)</h4><table><thead><tr><th>关键词</th><th>层级</th><th>条件</th></tr></thead><tbody><tr><td>\"small changes in i\"</td><td>Redington</td><td>PV 等 + 久期等 + 资产凸性<strong>更大</strong></td></tr><tr><td>\"regardless of magnitude\"</td><td>Full</td><td>PV 等 + 久期等 + 负债<strong>前后各一笔</strong>资产</td></tr><tr><td>\"exactly match\"</td><td>Dedication</td><td>\\(A_t=L_t\\) 逐期;<strong>从最远期负债倒推</strong>逐只债面值</td></tr></tbody></table><h4>易错</h4><ul><li>资产现金流<strong>夹在</strong>负债中间 ⇒ 凸性必输(Ex 8.20 专考失败案例)。</li><li>第三条件是严格大于,写等号即错(Ex 8.18 答案 E)。</li><li>免疫非一劳永逸:久期随时间锯齿漂移,需 rebalance。</li></ul>"}, {"id": "通胀年金与真实利率的等价", "type": "a", "level": "advanced", "chapter": "fm-l05", "status": "wip", "en": "", "rels": ["等比年金", "真实利率", "年金基本符号"], "html": "<p><strong>题型</strong>:退休金要\"购买力恒定\"(每期按通胀 r 几何递增),给 PV/给付款反解利率——新大纲常客。</p><h4>一个等价,两个方向</h4><div class=\"net-mth\">$$\\text{付款按 }(1+r)\\text{ 递增、按 }i\\text{ 折现}\\iff \\text{付款水平、按 }i'=\\frac{i-r}{1+r}\\text{ 折现}$$</div><ul><li><strong>正向(定价)</strong>:换成 i′ 后水平年金 TVM 一键(Ch4 的调整利率 trick 与 Ch5 的实际利率是同一个 i′)。</li><li><strong>反向(反解)</strong>:给 PV 与几何付款串 → TVM 解出的 I/Y 是 <strong>i′</strong>,再用 \\(i=i'+r+i'r\\) 还原市场利率(ASM Ex 5.13 标准套路:N=15、PV=120,137、PMT=−10,000、CPT I/Y=2.9127% → i=6%)。</li></ul><h4>易错</h4><ul><li>首付款是 X(1+r) 还是 X:决定比值从一次方还是零次方起。</li><li>高通胀禁用 i′≈i−r(Ex 5.10 专考)。</li><li>等差(\"increase by X\")≠ 等比(\"increase by X%\"),读题第一眼分家。</li></ul>"}], "links": [{"s": "FM考试的BA II Plus操作体系", "t": "债券定价"}, {"s": "FM考试的BA II Plus操作体系", "t": "净现值与内部收益率"}, {"s": "FM考试的BA II Plus操作体系", "t": "名义利率"}, {"s": "FM考试的BA II Plus操作体系", "t": "年金基本符号"}, {"s": "FM考试的BA II Plus操作体系", "t": "等差年金"}, {"s": "FM考试的BA II Plus操作体系", "t": "贷款摊还"}, {"s": "久期", "t": "债券定价"}, {"s": "久期", "t": "免疫策略"}, {"s": "久期", "t": "凸性"}, {"s": "久期", "t": "利息力"}, {"s": "久期", "t": "永续年金"}, {"s": "久期", "t": "等时法"}, {"s": "久期", "t": "资产负债免疫的三层防护"}, {"s": "价值方程", "t": "净现值与内部收益率"}, {"s": "价值方程", "t": "年金基本符号"}, {"s": "价值方程", "t": "现值与折现因子"}, {"s": "价值方程", "t": "等时法"}, {"s": "价值方程", "t": "贷款尾款与再融资"}, {"s": "价值方程", "t": "递延年金"}, {"s": "债券定价", "t": "债券溢价与折价"}, {"s": "债券定价", "t": "免疫策略"}, {"s": "债券定价", "t": "再投资利率"}, {"s": "债券定价", "t": "净现值与内部收益率"}, {"s": "债券定价", "t": "凸性"}, {"s": "债券定价", "t": "即期利率"}, {"s": "债券定价", "t": "可赎回债券"}, {"s": "债券定价", "t": "年金基本符号"   var link = g.append('g').attr('stroke','#c3cbd9').attr('stroke-width',1.1).attr('stroke-opacity',.7)
    .selectAll('line').data(links).join('line');
  var node = g.append('g').selectAll('g').data(nodes).join('g').attr('class','nd').style('cursor','pointer');
  node.each(function(d){
    var el = d3.select(this);
    el.append('circle').attr('class','halo').attr('r',14).attr('fill','none')
      .attr('stroke','#ffd23f').attr('stroke-width',3.5).attr('opacity',0);
    if(d.type === 'a'){
      el.append('rect').attr('x',-7.5).attr('y',-7.5).attr('width',15).attr('height',15)
        .attr('transform','rotate(45)').attr('rx',3)
        .attr('fill','#fff').attr('stroke',COLOR[d.level]||'#888').attr('stroke-width',2.4);
    } else {
      el.append('circle').attr('r',7).attr('fill',COLOR[d.level]||'#888')
        .attr('fill-opacity',.85).attr('stroke','#fff').attr('stroke-width',1.4);
    }
    el.append('text').text(d.id).attr('x',10).attr('y',4)
      .attr('font-size','10px').attr('fill','#3a4a63')
      .attr('paint-order','stroke').attr('stroke','#fff').attr('stroke-width',3);
  });

  var sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d){ return d.id; }).distance(52).strength(.35))
    .force('charge', d3.forceManyBody().strength(-130))
    .force('collide', d3.forceCollide(17))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('x', d3.forceX(W/2).strength(.03)).force('y', d3.forceY(H/2).strength(.03));
  sim.on('tick', function(){
    link.attr('x1',function(d){return d.source.x;}).attr('y1',function(d){return d.source.y;})
        .attr('x2',function(d){return d.target.x;}).attr('y2',function(d){return d.target.y;});
    node.attr('transform',function(d){ return 'translate('+d.x+','+d.y+')'; });
  });
  node.call(d3.drag()
    .on('start',function(ev,d){ if(!ev.active) sim.alphaTarget(.25).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',function(ev,d){ d.fx=ev.x; d.fy=ev.y; })
    .on('end',function(ev,d){ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  // ---- 筛选状态: 难度 LV · 章节 CH · 聚焦 FOCUS(仅双击控制) ----
  var LV = 'all', CH = 'all', ST = 'all', FOCUS = null;
  function pass(d){
    return (LV === 'all' || d.level === LV) && (CH === 'all' || d.chapter === CH)
        && (ST === 'all' || d.status === ST);
  }
  function visibleN(d){ return pass(d) && (!FOCUS || !!nbr[FOCUS][d.id]); }
  function visibleL(l){
    var s = l.source.id, t = l.target.id;
    if(!pass(byId[s]) || !pass(byId[t])) return false;
    if(FOCUS && s !== FOCUS && t !== FOCUS) return false;
    return true;
  }
  function apply(){
    node.style('display', function(d){ return visibleN(d) ? null : 'none'; });
    link.style('display', function(d){ return visibleL(d) ? null : 'none'; });
    node.select('text')
      .attr('font-size', function(d){ return FOCUS === d.id ? '13px' : (FOCUS ? '12px' : '10px'); })
      .attr('font-weight', function(d){ return FOCUS === d.id ? '700' : null; });
    node.select('.halo').attr('opacity', function(d){ return FOCUS === d.id ? 1 : 0; });
  }
  // 可见集变化后只对可见子图重排, 避免筛选/聚焦后节点挤作一团; 小子图加大间距
  function relayout(){
    var vis = nodes.filter(visibleN), vlinks = links.filter(visibleL);
    var small = vis.length < 25;
    sim.nodes(vis);
    sim.force('link', d3.forceLink(vlinks).id(function(d){ return d.id; })
      .distance(small ? 110 : 52).strength(.35));
    sim.force('charge', d3.forceManyBody().strength(small ? -340 : -130));
    sim.force('collide', d3.forceCollide(small ? 38 : 17));
    sim.alpha(.6).restart();
  }

  // ---- 章节筛选器 ----
  var chsel = host.querySelector('.chsel');
  var chSeen = {};
  nodes.forEach(function(n){ if(n.chapter) chSeen[n.chapter] = 1; });
  Object.keys(chSeen).sort().forEach(function(c){
    var o = document.createElement('option');
    o.value = c;
    o.textContent = c.toUpperCase() + (CHTITLE[c] ? ' · ' + CHTITLE[c] : '');
    chsel.appendChild(o);
  });
  chsel.addEventListener('change', function(){
    CH = chsel.value;
    chsel.classList.toggle('on', CH !== 'all');
    FOCUS = null; closeModal(); apply(); relayout();
  });

  // ---- 弹窗: 单击节点/点关联词条打开, 只展示不筛选 ----
  var modal = document.querySelector('.net-modal');
  var bd = modal.querySelector('.net-bd');
  function closeModal(){ modal.hidden = true; document.documentElement.style.overflow = ''; document.body.style.overflow = ''; }
  function openModal(d){
    modal.querySelector('.net-t').textContent = d.id;
    modal.querySelector('.net-kind').textContent = d.type === 'a' ? '◇ 应用卡 · Application' : '○ 概念卡 · Concept';
    var chip = modal.querySelector('.net-chip');
    chip.textContent = {basic:'基础',advanced:'进阶',hard:'高难'}[d.level] || d.level;
    chip.style.background = COLOR[d.level] || '#888';
    var stat = modal.querySelector('.net-stat');
    if(d.status){
      stat.style.display = '';
      stat.textContent = SLAB[d.status] || d.status;
      stat.style.background = SCOLOR[d.status] || '#6b7280';
    } else { stat.style.display = 'none'; }
    var chc = modal.querySelector('.net-chc');
    if(d.chapter && d.chapter !== 'l99'){
      chc.style.display = '';
      chc.textContent = d.chapter.toUpperCase() + (CHTITLE[d.chapter] ? ' · ' + CHTITLE[d.chapter] : '');
    } else { chc.style.display = 'none'; }
    var go = modal.querySelector('.net-go');
    if(d.chapter && CHMAP[d.chapter]){
      go.style.display = '';
      go.setAttribute('href', CHMAP[d.chapter]);
      go.textContent = '进入 ' + d.chapter.toUpperCase() + ' ↗';
    } else { go.style.display = 'none'; }
    var en = modal.querySelector('.net-en');
    en.textContent = d.en || '';
    en.style.display = d.en ? '' : 'none';
    bd.innerHTML = d.html || '';
    bd.scrollTop = 0;
    var rel = modal.querySelector('.net-rel'); rel.innerHTML = '';
    if(d.rels && d.rels.length){
      var lab = document.createElement('span'); lab.className = 'lab';
      lab.textContent = d.type === 'a' ? 'based_on:' : '相连:';
      rel.appendChild(lab);
      d.rels.forEach(function(r){
        if(!byId[r]) return;
        var a = document.createElement('a'); a.textContent = r;
        a.addEventListener('click', function(){ openModal(byId[r]); });
        rel.appendChild(a);
      });
    }
    modal.hidden = false;
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([modal.querySelector('.net-box')]);
  }
  bd.addEventListener('click', function(e){
    var a = e.target.closest ? e.target.closest('a.net-wl') : null;
    if(!a) return;
    var d = byId[a.getAttribute('data-id')];
    if(d) openModal(d);
  });

  // ---- 交互: 单击=弹窗(延时区分双击) · 双击=聚焦/还原, 聚焦中双击他节点无效 ----
  var clickTimer = null;
  node.on('click', function(ev, d){
    ev.stopPropagation();
    clearTimeout(clickTimer);
    clickTimer = setTimeout(function(){ openModal(d); }, 260);
  });
  node.on('dblclick', function(ev, d){
    ev.stopPropagation(); ev.preventDefault();
    clearTimeout(clickTimer);
    if(FOCUS === d.id){ FOCUS = null; }        // 再次双击同节点 → 还原
    else if(FOCUS){ return; }                   // 聚焦中: 先还原才能聚焦其他节点
    else { FOCUS = d.id; }                      // 双击 → 聚焦直连网络
    apply(); relayout();
  });
  svg.on('click', function(){ if(FOCUS){ FOCUS = null; apply(); relayout(); } });
  modal.addEventListener('wheel', function(e){ if (!bd.contains(e.target)) e.preventDefault(); }, {passive: false});
  modal.querySelector('.net-x').addEventListener('click', closeModal);
  modal.querySelector('.net-back').addEventListener('click', closeModal);
  modal.querySelector('.net-go').addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape'){ closeModal(); } });

  var fsb = host.querySelector('.fsbtn'), stage = host.querySelector('.stage');
  if(fsb) fsb.addEventListener('click', function(){
    if(document.fullscreenElement){ document.exitFullscreen(); }
    else if(stage.requestFullscreen){ stage.requestFullscreen(); }
  });
  document.addEventListener('fullscreenchange', function(){
    var fs = !!document.fullscreenElement;
    if(fsb) fsb.textContent = fs ? '✕ 退出全屏' : '⛶ 全屏';
    var w = svg.node().clientWidth || W, h = svg.node().clientHeight || H;
    sim.force('center', d3.forceCenter(w/2, h/2));
    sim.force('x', d3.forceX(w/2).strength(.03));
    sim.force('y', d3.forceY(h/2).strength(.03));
    sim.alpha(.3).restart();
  });

  Array.prototype.forEach.call(host.querySelectorAll('.seg'), function(seg){
    var k = seg.getAttribute('data-k');
    Array.prototype.forEach.call(seg.querySelectorAll('button'), function(b){
      b.addEventListener('click', function(){
        Array.prototype.forEach.call(seg.querySelectorAll('button'), function(x){ x.classList.remove('on'); });
        b.classList.add('on');
        if(k === 'lv') LV = b.getAttribute('data-v');
        else ST = b.getAttribute('data-v');
        FOCUS = null; closeModal(); apply(); relayout();
      });
    });
  });
})();
</script>
